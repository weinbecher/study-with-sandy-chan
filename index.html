<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>N2 二选一陷阱特训｜Study with Sandy</title>
  <style>
    :root {
      --pink-50: #fff8fb;
      --pink-100: #ffeaf2;
      --pink-200: #ffd3e2;
      --pink-400: #ee79a4;
      --pink-600: #bd3e6b;
      --ink: #422d36;
      --muted: #856a76;
      --white: #fff;
      --shadow: 0 18px 50px rgba(157, 68, 103, .14);
    }

    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "Hiragino Sans", "Yu Gothic", sans-serif;
      background: radial-gradient(circle at 10% 10%, #fff 0 11%, transparent 11.5%),
                  radial-gradient(circle at 92% 12%, #ffe4ee 0 12%, transparent 12.5%),
                  linear-gradient(135deg, #fff8fb, #fff0f5 52%, #fdf8ff);
    }

    .app { width: min(720px, calc(100% - 32px)); margin: 0 auto; padding: 24px 0 36px; }
    header { text-align: center; margin-bottom: 14px; }
    .eyebrow { color: var(--pink-600); font-size: .7rem; font-weight: 800; letter-spacing: .12em; }
    h1 { margin: 4px 0 4px; font-size: clamp(1.45rem, 4.2vw, 2.05rem); letter-spacing: .02em; }
    .subtitle { margin: 0; color: var(--muted); font-size: .84rem; }
    .account { display: inline-flex; align-items: center; justify-content: center; gap: 8px; margin-top: 8px; padding: 5px 9px; border: 1px solid #f3d5e0; border-radius: 999px; color: var(--muted); background: rgba(255,255,255,.7); font-size: .74rem; font-weight: 700; }
    .account button { border: 0; padding: 3px 5px; color: var(--pink-600); background: transparent; cursor: pointer; font: inherit; font-weight: 800; }
    .account button:hover { text-decoration: underline; }
    .account a { color: var(--pink-600); font-weight: 800; text-decoration: none; }
    .account a:hover { text-decoration: underline; }
    .account:not(.signed-in) #accountAction, .account.signed-in #loginLink { display: none; }
    .quick-links { display: flex; justify-content: center; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .quick-links a { padding: 7px 12px; border: 1px solid #f0c9d7; border-radius: 999px; color: var(--pink-600); background: rgba(255,255,255,.74); font-size: .78rem; font-weight: 900; text-decoration: none; }
    .quick-links a:hover { background: white; box-shadow: 0 7px 18px rgba(157,68,103,.12); }

    .progress-wrap { display: flex; align-items: center; gap: 12px; margin: 0 4px 14px; color: var(--muted); font-size: .86rem; font-weight: 700; }
    .progress { overflow: hidden; flex: 1; height: 10px; border-radius: 999px; background: var(--pink-200); }
    .progress > span { display: block; height: 100%; width: 0; border-radius: inherit; background: linear-gradient(90deg, #f5a4c0, var(--pink-400)); transition: width .35s ease; }

    .card { overflow: hidden; background: rgba(255,255,255,.92); border: 1px solid rgba(238,121,164,.18); border-radius: 24px; box-shadow: var(--shadow); }
    .card-inner { padding: clamp(24px, 6vw, 42px); }
    .grammar-tag { display: inline-block; padding: 6px 11px; border-radius: 999px; color: var(--pink-600); background: var(--pink-100); font-family: "Yu Gothic", sans-serif; font-size: .88rem; font-weight: 800; }
    .question { margin: 19px 0 7px; font-size: clamp(1.2rem, 3.4vw, 1.5rem); font-weight: 800; line-height: 1.65; }
    .question-audio { display: inline-flex; align-items: center; gap: 5px; margin: 2px 0 10px; padding: 6px 9px; border: 0; border-radius: 9px; color: var(--pink-600); background: var(--pink-50); cursor: pointer; font: inherit; font-size: .82rem; font-weight: 800; }
    .question-audio:hover, .question-audio:focus-visible { color: white; background: var(--pink-400); outline: none; }
    .question-audio:disabled { color: var(--muted); background: #f5f0f2; cursor: default; }
    .hint { margin: 0 0 24px; color: var(--muted); font-size: .93rem; }
    .choices { display: grid; gap: 12px; }
    .choice {
      width: 100%; min-height: 64px; padding: 12px 18px; border: 2px solid #f5d3df; border-radius: 15px;
      color: var(--ink); background: var(--white); cursor: pointer; font: inherit; font-size: 1rem; text-align: left;
      transition: transform .16s ease, border-color .16s ease, background .16s ease;
    }
    .choice:hover:not(:disabled), .choice:focus-visible { border-color: var(--pink-400); background: #fff9fb; transform: translateY(-2px); outline: none; }
    .choice:disabled { cursor: default; }
    .choice.correct { border-color: #75c8a4; background: #edfbf4; }
    .choice.wrong { border-color: #ee8b9e; background: #fff0f2; }
    .choice b { color: var(--pink-600); font-family: "Yu Gothic", sans-serif; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 17px clamp(24px, 6vw, 42px); border-top: 1px solid #f8e4eb; color: var(--muted); background: #fffcfd; font-size: .88rem; }
    .footer-actions { display: flex; align-items: center; gap: 4px; }
    .score { font-weight: 800; }
    .restart, .sound-toggle { border: 0; padding: 8px 11px; color: var(--pink-600); background: transparent; cursor: pointer; font: inherit; font-weight: 800; }
    .restart:hover, .sound-toggle:hover { text-decoration: underline; }
    .sound-toggle[aria-pressed="false"] { color: var(--muted); }
    .voice-picker { display: inline-flex; align-items: center; gap: 5px; color: var(--muted); font-size: .78rem; font-weight: 700; }
    .voice-picker select { max-width: 135px; border: 1px solid #f0c9d7; border-radius: 7px; padding: 5px; color: var(--pink-600); background: white; font: inherit; }

    .wrongbook { margin-top: 18px; padding: 18px 20px; border: 1px solid rgba(238,121,164,.18); border-radius: 18px; background: rgba(255,255,255,.8); }
    .wrongbook-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .wrongbook h2 { margin: 0; font-size: 1rem; }
    .wrongbook-clear { border: 0; color: var(--pink-600); background: transparent; cursor: pointer; font: inherit; font-size: .8rem; font-weight: 800; }
    .wrongbook-empty { margin: 12px 0 0; color: var(--muted); font-size: .86rem; }
    .wrongbook-list { display: grid; gap: 10px; margin-top: 13px; }
    .wrongbook-item { padding: 12px; border-radius: 12px; background: #fff7fa; font-size: .86rem; line-height: 1.6; }
    .wrongbook-item strong { color: var(--pink-600); font-family: "Yu Gothic", sans-serif; }

    .overlay { position: fixed; z-index: 5; inset: 0; display: grid; place-items: center; padding: 20px; background: rgba(58, 31, 42, .33); opacity: 0; pointer-events: none; transition: opacity .2s; }
    .overlay.show { opacity: 1; pointer-events: auto; }
    .modal { width: min(480px, 100%); padding: 28px; border-radius: 22px; background: var(--white); box-shadow: 0 24px 70px rgba(49, 22, 33, .24); transform: translateY(8px) scale(.98); transition: transform .2s; }
    .overlay.show .modal { transform: translateY(0) scale(1); }
    .modal h2 { margin: 0 0 12px; font-size: 1.3rem; }
    .modal p { margin: 0; color: #5d4650; line-height: 1.75; }
    .modal .example { margin-top: 13px; padding: 13px; border-radius: 11px; background: var(--pink-50); color: #60434e; line-height: 1.7; font-size: .92rem; }
    .next { width: 100%; margin-top: 20px; padding: 13px; border: 0; border-radius: 12px; color: white; background: linear-gradient(135deg, #ef85aa, #d85888); cursor: pointer; font: inherit; font-weight: 800; box-shadow: 0 6px 15px rgba(216,88,136,.25); }
    .next:hover { filter: brightness(1.04); }

    .celebration { position: fixed; z-index: 7; inset: 0; display: grid; place-items: center; pointer-events: none; opacity: 0; transition: opacity .2s; }
    .celebration.show { opacity: 1; }
    .celebrate-box { padding: 25px 32px; border-radius: 24px; color: var(--pink-600); background: rgba(255,255,255,.93); box-shadow: var(--shadow); text-align: center; transform: scale(.6); }
    .celebration.show .celebrate-box { animation: pop .8s cubic-bezier(.18,.89,.32,1.28) forwards; }
    .face { font-size: clamp(2rem, 9vw, 3.3rem); }
    .yay { margin-top: 9px; font-weight: 900; }
    .heart { position: absolute; color: #f26b9a; font-size: 1.7rem; animation: float 1.25s ease-out forwards; }
    .sandy { position: fixed; z-index: 4; right: clamp(12px, 3vw, 30px); bottom: 16px; display: grid; justify-items: center; cursor: grab; user-select: none; touch-action: none; }
    .sandy.dragging { cursor: grabbing; }
    .sandy-speech { max-width: 176px; margin: 0 0 7px; padding: 9px 12px; border: 1px solid #f4cbd9; border-radius: 15px 15px 4px 15px; color: #8b4c62; background: rgba(255, 255, 255, .94); box-shadow: 0 7px 18px rgba(157,68,103,.13); font-size: .8rem; font-weight: 700; line-height: 1.35; text-align: center; }
    .sandy-image { position: relative; z-index: 2; display: block; width: 132px; height: 132px; object-fit: contain; filter: drop-shadow(0 7px 7px rgba(111,67,44,.18)); transition: transform .18s ease; }
    .sandy:hover .sandy-image { transform: translateY(-4px) scale(1.03); }
    .sandy.happy .sandy-image { animation: kitty-hop .45s ease-in-out 2; }
    .sandy-art { position: relative; }
    .sandy-eye { position: absolute; z-index: 3; top: 40px; width: 20px; height: 11px; border-top: 3px solid #5a463e; border-radius: 50%; opacity: 0; transform: scaleY(.2); transition: opacity .12s ease, transform .12s ease; pointer-events: none; }
    .sandy-eye.left { left: 48px; } .sandy-eye.right { left: 75px; }
    .sandy.blink .sandy-eye { opacity: 1; transform: scaleY(1); }
    .snack-pack { position: fixed; z-index: 4; left: clamp(12px, 3vw, 30px); bottom: 20px; padding: 10px; border: 1px solid #f0c9d7; border-radius: 18px; background: rgba(255,255,255,.94); box-shadow: 0 8px 22px rgba(157,68,103,.14); text-align: center; }
    .snack-pack-title { margin: 0 0 6px; border: 0; color: var(--pink-600); background: transparent; cursor: pointer; font: inherit; font-size: .72rem; font-weight: 900; letter-spacing: .05em; }
    .snack-pack-title::after { content: "⌃"; display: inline-block; margin-left: 5px; transition: transform .16s ease; }
    .snack-pack.collapsed { padding: 7px 10px; }
    .snack-pack.collapsed .snack-list { display: none; }
    .snack-pack.collapsed .snack-pack-title { margin: 0; }
    .snack-pack.collapsed .snack-pack-title::after { transform: rotate(180deg); }
    .snack-list { display: flex; gap: 6px; }
    .snack { width: 38px; height: 38px; border: 0; border-radius: 11px; background: #fff4f7; cursor: grab; font-size: 1.35rem; touch-action: none; transition: transform .15s ease, background .15s ease; }
    .snack:hover { background: #ffe3ed; transform: translateY(-2px); }
    .snack.dragging { opacity: .45; cursor: grabbing; }
    .snack-ghost { position: fixed; z-index: 12; display: grid; place-items: center; width: 46px; height: 46px; border-radius: 14px; background: white; box-shadow: 0 8px 16px rgba(101,44,67,.22); font-size: 1.7rem; pointer-events: none; transform: translate(-50%, -50%) rotate(8deg); }
    .snack-pop { position: fixed; z-index: 11; font-size: 2rem; pointer-events: none; animation: snack-pop .9s ease-out forwards; }
    @keyframes pop { 0% { transform: scale(.6); } 55% { transform: scale(1.08); } 100% { transform: scale(1); } }
    @keyframes float { from { opacity: 0; transform: translateY(30px) scale(.5); } 20% { opacity: 1; } to { opacity: 0; transform: translateY(-160px) scale(1.25) rotate(18deg); } }
    @keyframes kitty-hop { 50% { transform: translateY(-8px) rotate(2deg); } }
    @keyframes snack-pop { from { opacity: 0; transform: translateY(16px) scale(.55); } 30% { opacity: 1; } to { opacity: 0; transform: translateY(-54px) scale(1.3); } }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; } }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div class="eyebrow">N2 TWO-CHOICE TRAPS</div>
      <h1>N2 二选一陷阱特训</h1>
      <p class="subtitle">100 组高频易混搭配、语法、敬语与自他动词。</p>
      <div class="account" id="account">
        <span id="accountStatus">Progress is saved when you sign in.</span>
        <a id="loginLink" href="login.html">Sign in</a>
        <button id="accountAction" type="button">Sign out</button>
      </div>
      <nav class="quick-links" aria-label="学习页面">
        <a href="vocab.html">📚 N2 词汇表</a>
      </nav>
    </header>

    <div class="progress-wrap"><span id="progressText">第 1 / 6 題</span><div class="progress"><span id="progressBar"></span></div></div>
    <section class="card" aria-live="polite">
      <div class="card-inner">
        <span class="grammar-tag" id="grammarTag">接續表現</span>
        <p class="question" id="question"></p>
        <button class="question-audio" id="questionAudio" type="button">🔊 朗讀題目</button>
        <p class="hint">请在两个看似都像的选项里，选出日语里更自然的一项。</p>
        <div class="choices" id="choices"></div>
      </div>
      <footer class="card-footer">
        <span class="score" id="score">答對 0 題</span>
        <div class="footer-actions">
          <button class="sound-toggle" id="soundToggle" type="button" aria-pressed="true">🔊 語音：開</button>
          <label class="voice-picker">聲音<select id="voiceSelect" aria-label="選擇日文語音"><option>載入中…</option></select></label>
          <button class="restart" id="restart" type="button">重新開始</button>
        </div>
      </footer>
    </section>
    <section class="wrongbook" aria-live="polite">
      <div class="wrongbook-head"><h2>📘 错题本 <span id="wrongbookCount">0</span></h2><button class="wrongbook-clear" id="wrongbookClear" type="button">清空记录</button></div>
      <p class="wrongbook-empty" id="wrongbookEmpty">目前没有错题记录。</p>
      <div class="wrongbook-list" id="wrongbookList"></div>
    </section>
  </main>

  <div class="overlay" id="explainOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <h2 id="modalTitle">再看一次重點</h2>
      <p id="explanation"></p>
      <div class="example" id="example"></div>
      <button class="next" id="next" type="button">下一題</button>
    </div>
  </div>

  <div class="celebration" id="celebration" aria-live="polite"><div class="celebrate-box"><div class="face">٩(◕‿◕)۶</div><div class="yay">答對了！很自然！</div></div></div>

  <div class="sandy" id="sandy" role="button" tabindex="0" aria-label="和三花貓 Sandy 互動">
    <div class="sandy-speech" id="sandySpeech">你好，我是 Sandy！點我一下吧。</div>
    <div class="sandy-art">
      <img class="sandy-image" src="assets/sandy-green-eyes.png" alt="Sandy，一隻綠眼睛的可愛三花貓">
      <span class="sandy-eye left" aria-hidden="true"></span><span class="sandy-eye right" aria-hidden="true"></span>
    </div>
  </div>
  <aside class="snack-pack" aria-label="Sandy 的零食包">
    <button class="snack-pack-title" id="snackToggle" type="button" aria-expanded="false">SANDY'S SNACKS</button>
    <div class="snack-list">
      <button class="snack" type="button" data-snack="🐟" aria-label="拖曳小魚給 Sandy">🐟</button>
      <button class="snack" type="button" data-snack="🍪" aria-label="拖曳餅乾給 Sandy">🍪</button>
      <button class="snack" type="button" data-snack="🍓" aria-label="拖曳草莓給 Sandy">🍓</button>
    </div>
  </aside>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // 新增题目时，只要照着 rawQuestions 的结构加入即可。
    const rawQuestions = [
      { id: "001", topic: "词汇搭配", grammar: "注目を集める", sentence: "このニュースは多くの注目を____。", correct: "集める", wrong: "招く", tip: "注目・人気・関心は「集める」と搭配。", reason: "容易只看汉字，把「招く」误当成所有抽象结果都能接。" },
      { id: "002", topic: "词汇搭配", grammar: "誤解を招く", sentence: "曖昧な説明は誤解を____ことがある。", correct: "招く", wrong: "集める", tip: "抽象负面结果、麻烦、误解常用「招く」。", reason: "「集める」是收集注意、资料、人气，不自然接「誤解」。" },
      { id: "003", topic: "词汇搭配", grammar: "理解を深める", sentence: "この本は日本文化への理解を____のに役立つ。", correct: "深める", wrong: "高める", tip: "理解・交流・関係是往深处发展，用「深める」。", reason: "中文常说“提高理解”，但日语更自然是「理解を深める」。" },
      { id: "004", topic: "词汇搭配", grammar: "能力を高める", sentence: "研修で社員の能力を____。", correct: "高める", wrong: "深める", tip: "能力・品質・意識是水平上升，用「高める」。", reason: "「深める」适合理解、关系、交流，不适合能力水平。" },
      { id: "005", topic: "词汇搭配", grammar: "交流を深める", sentence: "留学を通して現地の学生との交流を____。", correct: "深める", wrong: "高める", tip: "人与人、国家之间的交流加深，用「深める」。", reason: "交流不是数值或等级上升，所以不用「高める」。" },
      { id: "006", topic: "词汇搭配", grammar: "緊張が高まる", sentence: "試験開始が近づき、教室の緊張が____。", correct: "高まる", wrong: "深まる", tip: "情绪、期待、紧张的强度上升，用「高まる」。", reason: "中文“加深紧张”会干扰，但日语自然搭配是「緊張が高まる」。" },
      { id: "007", topic: "词汇搭配", grammar: "期待に応える", sentence: "チームはファンの期待に____プレーをした。", correct: "応える", wrong: "答える", tip: "質問には「答える」；期待・要望には「応える」。", reason: "「答える」偏回答问题，不是回应期待。" },
      { id: "008", topic: "词汇搭配", grammar: "質問に答える", sentence: "先生は学生の質問に丁寧に____。", correct: "答える", wrong: "応える", tip: "有具体问题、需要答案时用「答える」。", reason: "「応える」是回应期待、要求、声援，不能泛化成所有回应。" },
      { id: "009", topic: "词汇搭配", grammar: "迷惑をかける", sentence: "遅刻してみんなに迷惑を____しまった。", correct: "かける", wrong: "与える", tip: "看到「迷惑」先反应「迷惑をかける」。", reason: "中文“造成麻烦”会让人想选「与える」，但固定搭配更重要。" },
      { id: "010", topic: "词汇搭配", grammar: "声をかける", sentence: "困っている人に声を____。", correct: "かける", wrong: "あげる", tip: "主动搭话、招呼别人是「声をかける」。", reason: "「声をあげる」偏发出声音、呼喊，不是对人搭话。" },
      { id: "011", topic: "词汇搭配", grammar: "計画を立てる", sentence: "週末旅行の計画を____。", correct: "立てる", wrong: "建てる", tip: "计划、目标、方针等无形事务用「立てる」。", reason: "「建てる」主要用于建造建筑物。" },
      { id: "012", topic: "词汇搭配", grammar: "腕を磨く", sentence: "毎日練習して料理の腕を____。", correct: "磨く", wrong: "研ぐ", tip: "技能、センス、腕前要打磨提升，用「磨く」。", reason: "「研ぐ」多用于磨刀、研磨具体锋利物。" },
      { id: "013", topic: "词汇搭配", grammar: "視野を広げる", sentence: "海外経験は視野を____。", correct: "広げる", wrong: "拡大する", tip: "抽象的眼界、视野更自然说「広げる」。", reason: "「拡大する」书面感强，多用于规模、范围扩大。" },
      { id: "014", topic: "词汇搭配", grammar: "注意を払う", sentence: "細かいミスにも注意を____必要がある。", correct: "払う", wrong: "配る", tip: "注意・敬意・金は「払う」。", reason: "「気を配る」可以，但固定搭配是「注意を払う」。" },
      { id: "015", topic: "词汇搭配", grammar: "勇気を出す", sentence: "勇気を____告白した。", correct: "出す", wrong: "上げる", tip: "勇气是“拿出来”，日语说「勇気を出す」。", reason: "中文“提高勇气”容易直译，但「勇気を上げる」不自然。" },
      { id: "016", topic: "词汇搭配", grammar: "決心がつく", sentence: "やっと留学する決心が____。", correct: "つく", wrong: "決まる", tip: "自己心里的决定形成，用「決心がつく」。", reason: "「決まる」偏事情、日程、规则决定下来。" },
      { id: "017", topic: "词汇搭配", grammar: "印象に残る", sentence: "あの先生の言葉は今も印象に____。", correct: "残る", wrong: "残す", tip: "主语自己留在印象中，用自动词「残る」。", reason: "中文“留下印象”容易误导，但这里不是某人主动留下。" },
      { id: "018", topic: "词汇搭配", grammar: "話をまとめる", sentence: "会議の最後に部長が話を____。", correct: "まとめる", wrong: "集める", tip: "把零散内容整理成结论，用「まとめる」。", reason: "「集める」是收集物、人、资料，不是整理发言内容。" },
      { id: "019", topic: "词汇搭配", grammar: "関係を築く", sentence: "信頼できる関係を____には時間がかかる。", correct: "築く", wrong: "建てる", tip: "关系、信赖、实绩要建立，用「築く」。", reason: "「建てる」建的是房子等建筑物。" },
      { id: "020", topic: "词汇搭配", grammar: "疑問を抱く", sentence: "その説明に疑問を____学生もいた。", correct: "抱く", wrong: "持つ", tip: "书面抽象心理常用「疑問を抱く」。", reason: "「疑問を持つ」也可见，但考试书面搭配更常要「抱く」。" },
      { id: "021", topic: "词汇搭配", grammar: "法律に基づく", sentence: "この判断は法律に____ものだ。", correct: "基づく", wrong: "基づける", tip: "Nに基づく＋名词，表示以 N 为根据。", reason: "「基づける」是他动词，表示使某物以某物为基础。" },
      { id: "022", topic: "词汇搭配", grammar: "時間に追われる", sentence: "毎日仕事で時間に____生活をしている。", correct: "追われる", wrong: "追いつく", tip: "被时间、工作逼着走，用「追われる」。", reason: "「追いつく」是追上某人或进度。" },
      { id: "023", topic: "词汇搭配", grammar: "彼に追いつく", sentence: "全力で走って、やっと彼に____。", correct: "追いつく", wrong: "追いかける", tip: "目标是“赶上”就用「追いつく」。", reason: "「追いかける」只是追赶过程，不一定追上。" },
      { id: "024", topic: "词汇搭配", grammar: "制度を導入する", sentence: "会社は新しい制度を____ことにした。", correct: "導入する", wrong: "取り入れる", tip: "制度、设备、系统正式引入，用「導入する」。", reason: "「取り入れる」更像吸收意见、方法、元素。" },
      { id: "025", topic: "词汇搭配", grammar: "意見を述べる", sentence: "会議で自分の意見を____。", correct: "述べる", wrong: "言い出す", tip: "正式表达意见，用「意見を述べる」。", reason: "「言い出す」偏突然开始说、提起话题，语域不合。" },
      { id: "026", topic: "词汇搭配", grammar: "成果を上げる", sentence: "新しい方法で大きな成果を____。", correct: "上げる", wrong: "挙げる", tip: "成果、効果、利益常用「上げる」。", reason: "同音汉字容易混，但固定搭配是「成果を上げる」。" },
      { id: "027", topic: "词汇搭配", grammar: "手を抜く", sentence: "忙しくても仕事の手を____はいけない。", correct: "抜く", wrong: "捨てる", tip: "偷懒、不认真做是「手を抜く」。", reason: "不要按中文“放弃/丢手”去想，日语固定说法不同。" },
      { id: "028", topic: "词汇搭配", grammar: "責任を負う", sentence: "事故の責任を誰が____のか。", correct: "負う", wrong: "背負う", tip: "法律、社会责任用「責任を負う」。", reason: "中文“背负责任”会诱导选「背負う」。" },
      { id: "029", topic: "词汇搭配", grammar: "雰囲気を壊す", sentence: "不用意な一言で場の雰囲気を____。", correct: "壊す", wrong: "破る", tip: "气氛、关系等无形对象多用「壊す」。", reason: "中文“打破气氛”容易直译成「破る」。" },
      { id: "030", topic: "词汇搭配", grammar: "契約を結ぶ", sentence: "二社は正式に契約を____。", correct: "結ぶ", wrong: "つなぐ", tip: "契约、条约、关系用「結ぶ」。", reason: "「つなぐ」偏物理连接或维持联系，不是签订契约。" },
      { id: "031", topic: "动词自他", grammar: "ドアが開く", sentence: "このドアは自動で____。", correct: "開く", wrong: "開ける", tip: "が提示状态自己变化，用自动词「開く」。", reason: "中文“开”不分自他，日语要看助词和施事者。" },
      { id: "032", topic: "动词自他", grammar: "ドアを開ける", sentence: "暑かったので、ドアを____ことにした。", correct: "開ける", wrong: "開く", tip: "を提示人为动作对象，用他动词「開ける」。", reason: "看到宾语「を」时，先排查是不是需要他动词。" },
      { id: "033", topic: "动词自他", grammar: "電気がつく", sentence: "暗くなると、玄関の電気が自動で____。", correct: "つく", wrong: "つける", tip: "灯亮起来这个状态出现，用「つく」。", reason: "「开灯」和「灯亮」中文接近，日语必须拆开。" },
      { id: "034", topic: "动词自他", grammar: "電気をつける", sentence: "部屋が暗いので、電気を____ことにした。", correct: "つける", wrong: "つく", tip: "人去操作电灯，用「電気をつける」。", reason: "不要只看「電気」，要看前面是「が」还是「を」。" },
      { id: "035", topic: "动词自他", grammar: "窓が閉まる", sentence: "強い風で窓が自然に____ことがある。", correct: "閉まる", wrong: "閉める", tip: "窗户自己进入关闭状态，用「閉まる」。", reason: "中文“关”一词通吃，日语自他分开。" },
      { id: "036", topic: "动词自他", grammar: "窓を閉める", sentence: "寒いので窓を____ことにした。", correct: "閉める", wrong: "閉まる", tip: "有人主动关窗，用「窓を閉める」。", reason: "对象前是「を」，通常需要他动词。" },
      { id: "037", topic: "动词自他", grammar: "会議が始まる", sentence: "会議が三時に____予定だ。", correct: "始まる", wrong: "始める", tip: "会议这件事自己开始，用「始まる」。", reason: "中文“开始会议”会让人忽视主语是会議。" },
      { id: "038", topic: "动词自他", grammar: "会議を始める", sentence: "予定通り会議を____ことにした。", correct: "始める", wrong: "始まる", tip: "人为开始某件事，用「始める」。", reason: "「を」支配的对象一般要求他动词。" },
      { id: "039", topic: "动词自他", grammar: "値段が上がる", sentence: "来月から値段が____らしい。", correct: "上がる", wrong: "上げる", tip: "价格自己上涨，用「上がる」。", reason: "中文“涨价/提高价格”容易混，先看是否有人主动调价。" },
      { id: "040", topic: "动词自他", grammar: "値段を上げる", sentence: "店は来月から値段を____ことにした。", correct: "上げる", wrong: "上がる", tip: "店家主动提高价格，用「上げる」。", reason: "主语是店或公司并且对象是价格时，要用他动词。" },
      { id: "041", topic: "动词自他", grammar: "人口が増える", sentence: "この町では人口が少しずつ____。", correct: "増える", wrong: "増やす", tip: "数量自然变多，用「増える」。", reason: "中文“增加”不分自他，日语要看动作主。" },
      { id: "042", topic: "动词自他", grammar: "社員を増やす", sentence: "会社は来年、社員を____予定だ。", correct: "増やす", wrong: "増える", tip: "组织主动增加人手，用「増やす」。", reason: "前面有「社員を」，不是员工自己增加。" },
      { id: "043", topic: "动词自他", grammar: "荷物が落ちる", sentence: "棚から荷物が____ことがある。", correct: "落ちる", wrong: "落とす", tip: "东西自己掉下来，用「落ちる」。", reason: "中文“掉了/弄掉”不拆，日语要区分自动他动。" },
      { id: "044", topic: "动词自他", grammar: "財布を落とす", sentence: "駅で財布を____しまった。", correct: "落とす", wrong: "落ちる", tip: "我把某物弄丢、弄掉，用「を＋落とす」。", reason: "「財布が落とした」这类结构是自他方向错。" },
      { id: "045", topic: "动词自他", grammar: "子どもを集める", sentence: "先生は校庭に子どもを____。", correct: "集める", wrong: "集まる", tip: "把对象召集过来，用「集める」。", reason: "自己聚过来是「集まる」，有对象「を」时用「集める」。" },
      { id: "046", topic: "语感与副词", grammar: "わざと", sentence: "彼はみんなを困らせるために____遅れて来た。", correct: "わざと", wrong: "わざわざ", tip: "故意做坏事或造成麻烦，用「わざと」。", reason: "「わざわざ」是特意费心做某事，常带感谢语气。" },
      { id: "047", topic: "语感与副词", grammar: "わざわざ", sentence: "遠いところを____来てくれてありがとう。", correct: "わざわざ", wrong: "わざと", tip: "感谢别人专门来、特意做，用「わざわざ」。", reason: "「わざと来てくれて」会变成“故意来”，语气怪。" },
      { id: "048", topic: "语感与副词", grammar: "ようやく", sentence: "何年も努力して、____合格した。", correct: "ようやく", wrong: "ついに", tip: "好不容易经过努力终于达成，用「ようやく」。", reason: "「ついに」更强调终局到来，不一定有辛苦过程感。" },
      { id: "049", topic: "语感与副词", grammar: "ついに", sentence: "長い沈黙のあと、彼は____真実を語った。", correct: "ついに", wrong: "ようやく", tip: "关键时刻终于到来、进入终局，用「ついに」。", reason: "这里重点不是费力完成任务，而是沉默后的最终行动。" },
      { id: "050", topic: "语感与副词", grammar: "とうとう", sentence: "何度注意しても、彼は____来なかった。", correct: "とうとう", wrong: "ようやく", tip: "和否定、坏结果搭配时，常用「とうとう」。", reason: "「ようやく」偏终于达成期待结果，不适合这里的坏结果。" },
      { id: "051", topic: "语感与副词", grammar: "なかなか", sentence: "この映画は____おもしろい。", correct: "なかなか", wrong: "かなり", tip: "肯定句中表示超出预期、还挺不错，用「なかなか」。", reason: "「かなり」只是程度相当高，少了“比预想好”的语感。" },
      { id: "052", topic: "语感与副词", grammar: "なかなか＋否定", sentence: "時間がなくて、宿題が____できない。", correct: "なかなか", wrong: "かなり", tip: "和否定连用，表示怎么也不容易实现，用「なかなか」。", reason: "「かなりできない」不自然，程度副词不能这样搭。" },
      { id: "053", topic: "语感与副词", grammar: "ぜひ", sentence: "明日の説明会には____参加してください。", correct: "ぜひ", wrong: "きっと", tip: "请求、邀请、愿望时用「ぜひ」。", reason: "「きっと」是说话人的确定判断，不用于要求对方务必做。" },
      { id: "054", topic: "语感与副词", grammar: "きっと", sentence: "彼なら____成功する。", correct: "きっと", wrong: "ぜひ", tip: "推测未来一定会发生，用「きっと」。", reason: "「ぜひ」表达强烈希望或邀请，不是判断。" },
      { id: "055", topic: "语感与副词", grammar: "かえって", sentence: "失敗するかと思ったが、____良い結果になった。", correct: "かえって", wrong: "むしろ", tip: "与预期相反，结果反而变好，用「かえって」。", reason: "「むしろ」偏比较选择：与其 A 不如 B。" },
      { id: "056", topic: "语感与副词", grammar: "むしろ", sentence: "甘い物を食べるより、____果物のほうが好きだ。", correct: "むしろ", wrong: "かえって", tip: "AよりBだ 的比较取舍，用「むしろ」。", reason: "这里不是预期相反的实际结果，所以不用「かえって」。" },
      { id: "057", topic: "语感与副词", grammar: "ぴったり", sentence: "このかばんは棚に____入る。", correct: "ぴったり", wrong: "しっかり", tip: "尺寸、时间、数量刚好吻合，用「ぴったり」。", reason: "「しっかり」强调牢固、认真，不强调大小正合适。" },
      { id: "058", topic: "语感与副词", grammar: "ちゃんと", sentence: "資料を____読んでから来てください。", correct: "ちゃんと", wrong: "しっかり", tip: "按要求、规规矩矩完成，用「ちゃんと」。", reason: "「しっかり」也可表示认真，但这里更像要求对方不要敷衍。" },
      { id: "059", topic: "语感与副词", grammar: "しっかり", sentence: "基礎を____固める。", correct: "しっかり", wrong: "ちゃんと", tip: "基础、结构、抓牢、巩固，用「しっかり」。", reason: "「ちゃんと」偏按规则做好，不如「しっかり」贴合牢固感。" },
      { id: "060", topic: "语感与副词", grammar: "まもなく", sentence: "列車は____到着します。", correct: "まもなく", wrong: "そろそろ", tip: "广播、通知、正式场合的“即将”用「まもなく」。", reason: "「そろそろ」更口语，常带“差不多该……”的人为判断。" },
      { id: "061", topic: "语法点", grammar: "わけではない", sentence: "日本語が話せる人が、みんな敬語が上手な____。", correct: "わけではない", wrong: "とは限らない", tip: "否定从前项推出的“必然如此”，用「わけではない」。", reason: "两者都像“并不一定”，但这里是在否定整体结论。" },
      { id: "062", topic: "语法点", grammar: "とは限らない", sentence: "有名大学を卒業しても、必ず就職できる____。", correct: "とは限らない", wrong: "わけではない", tip: "表示“未必总是如此”的概率判断，用「とは限らない」。", reason: "看到「必ず」被否定时，常考「とは限らない」。" },
      { id: "063", topic: "语法点", grammar: "わけがない", sentence: "あんな簡単な問題、彼が解けない____。", correct: "わけがない", wrong: "はずがない", tip: "强烈主观断定“不可能”，用「わけがない」。", reason: "「はずがない」也是否定推量，但更依赖根据、按理判断。" },
      { id: "064", topic: "语法点", grammar: "はずがない", sentence: "連絡したのに返事がないなんて、彼が知らない____。", correct: "はずがない", wrong: "わけがない", tip: "有明确根据，按理说不可能，用「はずがない」。", reason: "这里根据是已经联系过，所以更适合「はず」。" },
      { id: "065", topic: "语法点", grammar: "ために", sentence: "合格する____、毎日単語を覚えている。", correct: "ために", wrong: "ように", tip: "前项是自己可控制的意志目标，用「ために」。", reason: "「ように」多接可能、状态、非意志目标。" },
      { id: "066", topic: "语法点", grammar: "ように", sentence: "忘れない____、メモしておこう。", correct: "ように", wrong: "ために", tip: "前项是状态或非意志控制，用「ように」。", reason: "「忘れない」不是直接意志动作，所以不用「ために」。" },
      { id: "067", topic: "语法点", grammar: "ことになる", sentence: "来週から出張に行く____。", correct: "ことになる", wrong: "ことにする", tip: "外部安排、规定、结果决定，用「ことになる」。", reason: "「ことにする」是自己做决定。" },
      { id: "068", topic: "语法点", grammar: "ことにする", sentence: "今年こそ毎日運動する____。", correct: "ことにする", wrong: "ことになる", tip: "自己决定要做某事，用「ことにする」。", reason: "这里不是公司、规定或别人安排，而是自我决定。" },
      { id: "069", topic: "语法点", grammar: "ようになる", sentence: "日本へ来てから、刺身が食べられる____。", correct: "ようになる", wrong: "ようにする", tip: "能力、习惯自然变化结果，用「ようになる」。", reason: "「ようにする」表示有意识努力保持某习惯。" },
      { id: "070", topic: "语法点", grammar: "ようにする", sentence: "健康のために、野菜を多く食べる____。", correct: "ようにする", wrong: "ようになる", tip: "有意识地养成或维持习惯，用「ようにする」。", reason: "这里是自己努力做到，不是自然变成。" },
      { id: "071", topic: "语法点", grammar: "おかげで", sentence: "先生にほめられた____、やる気が出た。", correct: "おかげで", wrong: "せいで", tip: "好结果、带感谢感，用「おかげで」。", reason: "「せいで」多用于坏结果和责怪。" },
      { id: "072", topic: "语法点", grammar: "せいで", sentence: "寝不足の____、頭が痛い。", correct: "せいで", wrong: "おかげで", tip: "后项是消极结果，用「せいで」。", reason: "「おかげで」用于好结果，不能配头痛这种坏结果。" },
      { id: "073", topic: "语法点", grammar: "に違いない", sentence: "彼はプロなのだから、そのくらい簡単にできる____。", correct: "に違いない", wrong: "に相違ない", tip: "一般会话、作文里的强推量，用「に違いない」。", reason: "「に相違ない」更正式、公文语体。" },
      { id: "074", topic: "语法点", grammar: "に相違ない", sentence: "本件は事実____。", correct: "に相違ない", wrong: "に違いない", tip: "官方、书面、郑重断定偏「に相違ない」。", reason: "意思接近，但语体差异是考点。" },
      { id: "075", topic: "语法点", grammar: "にすぎない", sentence: "彼はまだ学生に____。", correct: "すぎない", wrong: "しかない", tip: "Nにすぎない 表示“只不过是 N”。", reason: "「しかない」表示只有某物或只剩某办法，结构不同。" },
      { id: "076", topic: "语法点", grammar: "しかない", sentence: "時間がないから、タクシーで行く____。", correct: "しかない", wrong: "にすぎない", tip: "无奈只剩唯一办法，用「しかない」。", reason: "「にすぎない」是“不过是”，不能表示只好做某事。" },
      { id: "077", topic: "语法点", grammar: "わりに", sentence: "忙しい____、彼はいつも元気だ。", correct: "わりに", wrong: "くせに", tip: "中性观察“按理说却”，用「わりに」。", reason: "「くせに」带责备、不满语气。" },
      { id: "078", topic: "语法点", grammar: "くせに", sentence: "知っている____、どうして教えてくれなかったの。", correct: "くせに", wrong: "わりに", tip: "带责怪、抱怨口气，用「くせに」。", reason: "这里不是中性评价，而是在责备对方明明知道。" },
      { id: "079", topic: "语法点", grammar: "まま", sentence: "着替えもせず、コートを着た____寝てしまった。", correct: "まま", wrong: "っぱなし", tip: "AたままB 表示保持 A 状态做 B。", reason: "「っぱなし」常表示放着不管、一直开着。" },
      { id: "080", topic: "语法点", grammar: "っぱなし", sentence: "電気をつけ____で出かけた。", correct: "っぱなし", wrong: "まま", tip: "设备、门、水龙头等开着不管，用「っぱなし」。", reason: "「つけままで」不自然；这里要接成「つけっぱなしで」。" },
      { id: "081", topic: "接续与助词", grammar: "につれて", sentence: "年を取る____、新しいことを覚えにくくなる。", correct: "につれて", wrong: "にしたがって", tip: "自然变化同步推进，优先「につれて」。", reason: "「にしたがって」也表随着，但更常有规则、进程推进感。" },
      { id: "082", topic: "接续与助词", grammar: "に伴って", sentence: "規模が大きくなる____、予算も増えた。", correct: "に伴って", wrong: "につれて", tip: "正式书面、规模或社会变化伴随发生，用「に伴って」。", reason: "「につれて」偏自然同步变化，语体不如这里正式。" },

    function playMeow() {
      if (!soundEnabled) return;
      if (activeSandySound) {
        activeSandySound.pause();
        activeSandySound.currentTime = 0;
      }
      const source = sandySounds[Math.floor(Math.random() * sandySounds.length)];
      activeSandySound = new Audio(source);
      activeSandySound.volume = .85;
      activeSandySound.play().catch(() => {});
      return;
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!Audio) { speak("にゃー"); return; }
      const audio = new Audio();
      const now = audio.currentTime;
      const voice = audio.createOscillator();
      const warmth = audio.createOscillator();
      const wobble = audio.createOscillator();
      const filter = audio.createBiquadFilter();
      const gain = audio.createGain();
      const wobbleGain = audio.createGain();
      voice.type = "sawtooth";
      warmth.type = "sine";
      wobble.type = "sine";
      voice.frequency.setValueAtTime(620, now);
      voice.frequency.exponentialRampToValueAtTime(380, now + .22);
      voice.frequency.exponentialRampToValueAtTime(470, now + .58);
      warmth.frequency.setValueAtTime(310, now);
      warmth.frequency.exponentialRampToValueAtTime(195, now + .36);
      wobble.frequency.setValueAtTime(5.2, now);
      wobbleGain.gain.setValueAtTime(28, now);
      filter.type = "lowpass";
      filter.frequency.setValueAtTime(1350, now);
      filter.frequency.exponentialRampToValueAtTime(720, now + .65);
      filter.Q.value = 1.2;
      gain.gain.setValueAtTime(.001, now);
      gain.gain.exponentialRampToValueAtTime(.075, now + .06);
      gain.gain.exponentialRampToValueAtTime(.045, now + .42);
      gain.gain.exponentialRampToValueAtTime(.001, now + .72);
      wobble.connect(wobbleGain).connect(voice.frequency);
      voice.connect(filter);
      warmth.connect(filter);
      filter.connect(gain).connect(audio.destination);
      voice.start(now);
      warmth.start(now);
      wobble.start(now);
      voice.stop(now + .74);
      warmth.stop(now + .74);
      wobble.stop(now + .74);
    }

    function beginSandyDrag(event) {
      if (event.button !== undefined && event.button !== 0) return;
      const sandy = $("sandy");
      const box = sandy.getBoundingClientRect();
      sandy.setPointerCapture(event.pointerId);
      sandy.style.left = `${box.left}px`;
      sandy.style.top = `${box.top}px`;
      sandy.style.right = "auto";
      sandy.style.bottom = "auto";
      sandyDrag = { pointerId: event.pointerId, startX: event.clientX, startY: event.clientY, left: box.left, top: box.top, moved: false };
      sandy.classList.add("dragging");
      event.preventDefault();
    }

    function moveSandy(event) {
      if (!sandyDrag || event.pointerId !== sandyDrag.pointerId) return;
      const dx = event.clientX - sandyDrag.startX;
      const dy = event.clientY - sandyDrag.startY;
      if (Math.abs(dx) > 5 || Math.abs(dy) > 5) sandyDrag.moved = true;
      const sandy = $("sandy");
      const box = sandy.getBoundingClientRect();
      const maxLeft = Math.max(0, window.innerWidth - box.width);
      const maxTop = Math.max(0, window.innerHeight - box.height);
      sandy.style.left = `${Math.min(maxLeft, Math.max(0, sandyDrag.left + dx))}px`;
      sandy.style.top = `${Math.min(maxTop, Math.max(0, sandyDrag.top + dy))}px`;
    }

    function endSandyDrag(event) {
      if (!sandyDrag || event.pointerId !== sandyDrag.pointerId) return;
      const wasDrag = sandyDrag.moved;
      const sandy = $("sandy");
      sandy.classList.remove("dragging");
      if (sandy.hasPointerCapture(event.pointerId)) sandy.releasePointerCapture(event.pointerId);
      sandyDrag = null;
      if (!wasDrag) interactWithSandy();
    }

    function startSnackDrag(event) {

      snack.classList.add("dragging");

    function questionId(item) { return item.id || item.grammar; }

    function updateAccountUI() {
      $("account").classList.toggle("signed-in", Boolean(signedInUser));
      $("accountStatus").textContent = signedInUser ? `Saving progress for ${signedInUser.email}` : "Progress is saved when you sign in.";
    }

    async function startCloudSession() {
      if (!signedInUser) return;
      const { data, error } = await supabaseClient.from("study_sessions").insert({ user_id: signedInUser.id }).select().single();
      if (error) { console.warn("Could not start cloud session", error); return; }
      activeSession = data;
    }

    async function loadCloudProgress() {
      if (!signedInUser || cloudReady) return;
      cloudReady = true;
      const { data: session, error } = await supabaseClient.from("study_sessions").select("*").is("completed_at", null).order("started_at", { ascending: false }).limit(1).maybeSingle();
      if (error) { console.warn("Could not load cloud progress", error); return; }
      activeSession = session;
      if (!activeSession) await startCloudSession();
      if (activeSession) {
        current = activeSession.current_index;
        correctCount = activeSession.correct_count;
        if (current >= questions.length) showResult(); else render();
      }
      const { data: mistakes, error: mistakesError } = await supabaseClient.from("mistake_notebook").select("*");
      if (!mistakesError && mistakes) {
        mistakes.forEach((item) => {
          wrongBook[item.question_id || item.grammar] = { id: item.question_id, grammar: item.grammar, label: item.grammar, sentence: item.sentence, selected: item.selected_answer, correct: item.correct_answer, note: item.note };
        });
        renderWrongBook();
      }
    }

    function saveAnswer(item, selected, isCorrect) {
      if (!signedInUser || !activeSession) return;
      const nextIndex = current + 1;
      const nextScore = correctCount;
      supabaseClient.from("practice_attempts").insert({ user_id: signedInUser.id, session_id: activeSession.id, question_id: questionId(item), grammar: questionLabel(item), selected_answer: selected, is_correct: isCorrect }).then(({ error }) => { if (error) console.warn("Could not save answer", error); });
      activeSession.current_index = nextIndex;
      activeSession.correct_count = nextScore;
      supabaseClient.from("study_sessions").update({ current_index: nextIndex, correct_count: nextScore }).eq("id", activeSession.id).then(({ error }) => { if (error) console.warn("Could not save session", error); });
    }

    async function createFreshSession() {
      if (activeSession && !activeSession.completed_at) await supabaseClient.from("study_sessions").update({ completed_at: new Date().toISOString() }).eq("id", activeSession.id);
      activeSession = null;
      current = 0;
      correctCount = 0;
      if (signedInUser) await startCloudSession();
      render();
    }

    async function initialiseAccount() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      signedInUser = session?.user || null;
      updateAccountUI();
      if (signedInUser) await loadCloudProgress();
    }

    $("next").addEventListener("click", nextQuestion);
    $("questionAudio").addEventListener("click", () => {
      speechUnlocked = true;
      $("questionAudio").textContent = "🔊 重聽題目";
      speakQuestion();
    });
    $("restart").addEventListener("click", createFreshSession);
    $("accountAction").addEventListener("click", () => supabaseClient.auth.signOut());
    $("soundToggle").addEventListener("click", () => {
      soundEnabled = !soundEnabled;
      if (!soundEnabled) window.speechSynthesis.cancel();
      if (!soundEnabled && activeSandySound) activeSandySound.pause();
      updateSoundToggle();
    });
    $("voiceSelect").addEventListener("change", () => {
      try { localStorage.setItem("n2-grammar-voice", $("voiceSelect").value); } catch {}
      if (speechUnlocked) speakQuestion();
    });
    $("wrongbookClear").addEventListener("click", () => {
      wrongBook = {};
      try { localStorage.removeItem(wrongBookKey); } catch {}
      renderWrongBook();
      if (signedInUser) supabaseClient.from("mistake_notebook").delete().then(({ error }) => { if (error) console.warn("Could not clear cloud mistakes", error); });
    });
    $("sandy").addEventListener("pointerdown", beginSandyDrag);
    $("sandy").addEventListener("pointermove", moveSandy);
    $("sandy").addEventListener("pointerup", endSandyDrag);
    $("sandy").addEventListener("pointercancel", endSandyDrag);
    $("sandy").addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") { event.preventDefault(); interactWithSandy(); }
    });
    const snackPack = document.querySelector(".snack-pack");
    snackPack.classList.add("collapsed");
    $("snackToggle").addEventListener("click", () => {
      const collapsed = snackPack.classList.toggle("collapsed");
      $("snackToggle").setAttribute("aria-expanded", String(!collapsed));
    });
    document.querySelectorAll(".snack").forEach((snack) => {
      snack.addEventListener("pointerdown", startSnackDrag);
      snack.addEventListener("pointermove", moveSnackDrag);
      snack.addEventListener("pointerup", endSnackDrag);
      snack.addEventListener("pointercancel", endSnackDrag);
    });
    updateSoundToggle();
    loadVoices();
    if ("speechSynthesis" in window) window.speechSynthesis.addEventListener("voiceschanged", loadVoices);
    renderWrongBook();
    render();
    supabaseClient.auth.onAuthStateChange((_event, session) => {
      signedInUser = session?.user || null;
      activeSession = null;
      cloudReady = false;
      updateAccountUI();
      if (signedInUser) loadCloudProgress();
    });
    initialiseAccount();
  </script>
</body>
</html>
