<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in | Study with Sandy-chan</title>
  <style>
    :root { --pink-50: #f2fbff; --pink-100: #dff5ff; --pink-400: #5ec4ea; --pink-600: #1f8fb9; --ink: #16384a; --muted: #5a7f92; --shadow: 0 18px 50px rgba(30, 127, 170, .16); }
    * { box-sizing: border-box; }
    body { min-height: 100vh; display: grid; place-items: center; margin: 0; padding: 24px; color: var(--ink); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: radial-gradient(circle at 18% 14%, rgba(255,255,255,.95) 0 12%, transparent 12.5%), radial-gradient(circle at 88% 18%, rgba(190,238,255,.72) 0 16%, transparent 16.5%), linear-gradient(135deg, #f7fdff 0%, #e7f8ff 50%, #dff4ff 100%); }
    main { width: min(420px, 100%); padding: 30px; border: 1px solid rgba(75,177,218,.18); border-radius: 24px; background: rgba(255,255,255,.94); box-shadow: var(--shadow); text-align: center; }
    main::before { content: "𓇼 ⋆｡˚ 𓆝 ⋆｡˚"; display: block; margin-bottom: 10px; color: rgba(36,127,183,.42); font-size: .88rem; letter-spacing: .12em; }
    .eyebrow { color: var(--pink-600); font-size: .72rem; font-weight: 800; letter-spacing: .12em; }
    h1 { margin: 7px 0 6px; font-size: 1.7rem; }
    p { margin: 0; color: var(--muted); line-height: 1.5; }
    form { display: grid; gap: 10px; margin-top: 24px; text-align: left; }
    label { color: var(--muted); font-size: .78rem; font-weight: 800; }
    input { width: 100%; border: 1px solid #bfe9f7; border-radius: 10px; padding: 11px 12px; color: var(--ink); background: white; font: inherit; }
    button { border: 0; border-radius: 10px; padding: 11px 13px; color: white; background: linear-gradient(135deg, #70d5f4, #2b9ccd); cursor: pointer; font: inherit; font-weight: 800; }
    button:hover { filter: brightness(1.04); }
    .links { display: flex; justify-content: center; gap: 13px; margin-top: 16px; font-size: .84rem; }
    .links button, .back { padding: 0; color: var(--pink-600); background: transparent; text-decoration: none; }
    .message { min-height: 1.5em; margin-top: 15px; color: var(--muted); font-size: .86rem; }
    .message.error { color: #d65d72; }
    [hidden] { display: none !important; }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">STUDY WITH SANDY-CHAN</div>
    <h1 id="title">Welcome back</h1>
    <p id="intro">Sign in to keep your Japanese progress in sync.</p>
    <form id="loginForm">
      <label id="emailLabel" for="email">Email address</label>
      <input id="email" type="email" autocomplete="email" required>
      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" minlength="8" required>
      <button id="submit" type="submit">Sign in</button>
    </form>
    <div class="links" id="links">
      <button id="createAccount" type="button">Create account</button>
      <button id="resetPassword" type="button">Reset password</button>
    </div>
    <p class="message" id="message" aria-live="polite"></p>
    <a class="back" id="backLink" href="index.html">← Back to practice</a>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const client = window.supabase.createClient("https://dqkulgkvzawpboaoysum.supabase.co", "sb_publishable_kd_u18OSCcjCkLLAohOHig_67kwF35H");
    const $ = (id) => document.getElementById(id);
    const redirectParam = new URLSearchParams(window.location.search).get("redirect");
    const allowedRedirects = new Set(["index.html", "vocab.html", "grammar.html", "grammar-quiz.html", "mistakes.html", "tag.html"]);
    const redirectTarget = allowedRedirects.has(redirectParam) ? redirectParam : "index.html";
    let mode = "signin";
    let recovery = window.location.hash.includes("type=recovery");

    function setMessage(message, error = false) { $("message").textContent = message; $("message").classList.toggle("error", error); }
    function setMode(nextMode) {
      mode = nextMode;
      const recoveryMode = mode === "recovery";
      $("title").textContent = recoveryMode ? "Set a new password" : mode === "signup" ? "Create your account" : "Welcome back";
      $("intro").textContent = recoveryMode ? "Choose a new password for your account." : mode === "signup" ? "Create an account to save progress across devices." : "Sign in to keep your Japanese progress in sync.";
      $("submit").textContent = recoveryMode ? "Save new password" : mode === "signup" ? "Create account" : "Sign in";
      $("emailLabel").hidden = recoveryMode;
      $("email").hidden = recoveryMode;
      $("email").required = !recoveryMode;
      $("links").hidden = recoveryMode;
      $("password").autocomplete = recoveryMode || mode === "signup" ? "new-password" : "current-password";
      setMessage("");
    }
    function credentials() { return { email: $("email").value.trim(), password: $("password").value }; }
    function loginRedirectUrl() { return new URL(`login.html?redirect=${encodeURIComponent(redirectTarget)}`, window.location.href).href; }
    function redirectToPractice() { window.location.replace(redirectTarget); }

    $("loginForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const { email, password } = credentials();
      if (password.length < 8) { setMessage("Use a password of at least 8 characters.", true); return; }
      let result;
      if (mode === "recovery") result = await client.auth.updateUser({ password });
      else if (mode === "signup") result = await client.auth.signUp({ email, password, options: { emailRedirectTo: loginRedirectUrl() } });
      else result = await client.auth.signInWithPassword({ email, password });
      if (result.error) { setMessage(result.error.message, true); return; }
      if (mode === "signup" && !result.data.session) { setMessage("Account created. Check the email-confirmation setting in Supabase before trying again.", true); return; }
      if (mode === "recovery") setMessage("Password saved. Taking you back to practice…");
      redirectToPractice();
    });
    $("createAccount").addEventListener("click", () => setMode(mode === "signup" ? "signin" : "signup"));
    $("resetPassword").addEventListener("click", async () => {
      const email = $("email").value.trim();
      if (!email) { setMessage("Enter your email address first.", true); return; }
      const { error } = await client.auth.resetPasswordForEmail(email, { redirectTo: loginRedirectUrl() });
      setMessage(error ? error.message : "Password reset link sent.", Boolean(error));
    });
    $("backLink").href = redirectTarget;
    client.auth.onAuthStateChange((event, session) => {
      if (event === "PASSWORD_RECOVERY") { recovery = true; setMode("recovery"); }
      else if (event === "SIGNED_IN" && session && !recovery) redirectToPractice();
    });
    client.auth.getSession().then(({ data: { session } }) => { if (session && !recovery) redirectToPractice(); else setMode(recovery ? "recovery" : "signin"); });
  </script>
</body>
</html>
