<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>N2 押题语法表｜Study with Sandy</title>
  <style>
    :root {
      --pink-50: #fff8fb;
      --pink-100: #ffeaf2;
      --pink-200: #ffd3e2;
      --pink-400: #ee79a4;
      --pink-600: #bd3e6b;
      --blue-100: #e8efff;
      --blue-500: #527bd2;
      --ink: #422d36;
      --muted: #856a76;
      --white: #fff;
      --shadow: 0 18px 50px rgba(157, 68, 103, .14);
    }

    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      padding-bottom: 98px;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Hiragino Sans", "Yu Gothic", sans-serif;
      background: radial-gradient(circle at 10% 10%, #fff 0 11%, transparent 11.5%),
                  radial-gradient(circle at 92% 12%, #ffe4ee 0 12%, transparent 12.5%),
                  linear-gradient(135deg, #fff8fb, #fff0f5 52%, #f7faff);
    }

    .app { width: min(980px, calc(100% - 32px)); margin: 0 auto; padding: 24px 0 42px; }
    header { text-align: center; margin-bottom: 16px; }
    .eyebrow { color: var(--pink-600); font-size: .7rem; font-weight: 900; letter-spacing: .14em; }
    h1 { margin: 5px 0 5px; font-size: clamp(1.55rem, 4.6vw, 2.25rem); letter-spacing: .02em; }
    .subtitle { margin: 0; color: var(--muted); font-size: .9rem; line-height: 1.7; }
    .account { display: inline-flex; align-items: center; justify-content: center; gap: 8px; margin-top: 8px; padding: 5px 9px; border: 1px solid #f3d5e0; border-radius: 999px; color: var(--muted); background: rgba(255,255,255,.7); font-size: .74rem; font-weight: 700; }
    .account button { border: 0; padding: 3px 5px; color: var(--pink-600); background: transparent; cursor: pointer; font: inherit; font-weight: 800; }
    .account button:hover { text-decoration: underline; }
    .account a { color: var(--pink-600); font-weight: 800; text-decoration: none; }
    .account a:hover { text-decoration: underline; }
    .account:not(.signed-in) #accountAction, .account.signed-in #loginLink { display: none; }
    .nav { display: flex; justify-content: center; gap: 8px; margin-top: 11px; flex-wrap: wrap; }
    .nav a { padding: 7px 12px; border: 1px solid #f0c9d7; border-radius: 999px; color: var(--pink-600); background: rgba(255,255,255,.78); font-size: .8rem; font-weight: 900; text-decoration: none; }
    .nav a:hover { background: white; box-shadow: 0 7px 18px rgba(157,68,103,.12); }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto auto auto auto;
      gap: 10px;
      align-items: center;
      margin: 0 0 15px;
      padding: 12px;
      border: 1px solid rgba(238,121,164,.18);
      border-radius: 20px;
      background: rgba(255,255,255,.84);
      box-shadow: var(--shadow);
    }

    .search { min-width: 0; width: 100%; padding: 12px 14px; border: 1px solid #f0c9d7; border-radius: 13px; color: var(--ink); background: white; font: inherit; font-weight: 700; }
    .voice-picker { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-size: .8rem; font-weight: 800; white-space: nowrap; }
    .voice-picker select { max-width: 170px; border: 1px solid #f0c9d7; border-radius: 9px; padding: 8px; color: var(--pink-600); background: white; font: inherit; }
    .sound-toggle, .scroll-toggle, .favorite-filter { border: 0; padding: 10px 12px; border-radius: 12px; color: white; background: linear-gradient(135deg, #ef85aa, #d85888); cursor: pointer; font: inherit; font-weight: 900; white-space: nowrap; }
    .scroll-toggle { background: linear-gradient(135deg, #7ea0f0, #527bd2); }
    .favorite-filter { background: linear-gradient(135deg, #ffb36d, #ee79a4); }
    .sound-toggle[aria-pressed="false"], .scroll-toggle[aria-pressed="false"], .favorite-filter[aria-pressed="false"] { color: var(--muted); background: #f4edf0; }

    .status { margin: 0 4px 12px; color: var(--muted); font-size: .86rem; font-weight: 800; }
    .notebook-panel { margin: 0 0 14px; padding: 12px; border: 1px solid rgba(238,121,164,.18); border-radius: 20px; background: rgba(255,255,255,.82); box-shadow: 0 12px 30px rgba(157,68,103,.1); }
    .notebook-header { display: flex; justify-content: space-between; gap: 12px; align-items: start; margin-bottom: 10px; }
    .notebook-title { display: grid; gap: 2px; font-size: .94rem; font-weight: 950; }
    .notebook-help { color: var(--muted); font-size: .78rem; font-weight: 800; line-height: 1.55; }
    .clear-favorites { border: 1px solid #f0c9d7; border-radius: 999px; padding: 7px 10px; color: var(--pink-600); background: white; cursor: pointer; font: inherit; font-size: .78rem; font-weight: 900; white-space: nowrap; }
    .clear-favorites:disabled { cursor: not-allowed; opacity: .45; }
    .notebook-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .notebook-chip { border: 1px solid #f0c9d7; border-radius: 999px; padding: 7px 11px; color: var(--pink-600); background: #fff8fb; cursor: pointer; font: inherit; font-size: .82rem; font-weight: 900; }
    .notebook-chip:hover, .notebook-chip:focus-visible { border-color: var(--pink-400); background: white; outline: none; }
    .notebook-empty { color: var(--muted); font-size: .84rem; font-weight: 800; }

    .list { display: grid; gap: 10px; }
    .entry {
      display: grid;
      grid-template-columns: 64px minmax(190px, 1fr) minmax(170px, .9fr) auto;
      gap: 12px;
      align-items: center;
      padding: 12px;
      border: 1px solid rgba(238,121,164,.16);
      border-radius: 18px;
      background: rgba(255,255,255,.9);
      box-shadow: 0 8px 22px rgba(157,68,103,.08);
      cursor: pointer;
      transition: border-color .16s ease, box-shadow .16s ease, transform .16s ease;
    }
    .entry.playing { border-color: rgba(117,200,164,.75); box-shadow: 0 12px 28px rgba(75,150,114,.16); transform: translateY(-1px); }
    .entry.favorited { border-color: rgba(255,179,109,.55); background: linear-gradient(135deg, rgba(255,255,255,.96), rgba(255,248,251,.94)); }
    .num { color: var(--muted); font-size: .85rem; font-weight: 900; text-align: center; }
    .pattern-button {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--pink-200);
      border-radius: 13px;
      color: var(--pink-600);
      background: var(--pink-50);
      cursor: pointer;
      font: inherit;
      font-family: "Yu Gothic", "Hiragino Sans", sans-serif;
      font-size: 1.15rem;
      font-weight: 900;
      text-align: left;
      transition: transform .16s ease, background .16s ease, border-color .16s ease;
    }
    .pattern-button:hover, .pattern-button:focus-visible { border-color: var(--pink-400); background: white; transform: translateY(-1px); outline: none; }
    .pattern-button.speaking { border-color: #75c8a4; background: #edfbf4; }
    .meaning { color: #5d4650; line-height: 1.6; font-size: .94rem; }
    .tag { display: inline-flex; align-items: center; justify-content: center; width: fit-content; padding: 5px 9px; border-radius: 999px; color: var(--blue-500); background: var(--blue-100); font-size: .75rem; font-weight: 900; }
    .favorite-button { justify-self: end; border: 1px solid #ffd7a8; border-radius: 999px; padding: 9px 11px; color: #a45a1f; background: #fff6e9; cursor: pointer; font: inherit; font-size: .82rem; font-weight: 950; white-space: nowrap; transition: transform .16s ease, background .16s ease, border-color .16s ease; }
    .favorite-button[aria-pressed="true"] { color: white; border-color: #f2a45f; background: linear-gradient(135deg, #ffbd78, #ee79a4); box-shadow: 0 8px 18px rgba(238,121,164,.18); }
    .favorite-button:hover, .favorite-button:focus-visible { border-color: #f2a45f; transform: translateY(-1px); outline: none; }
    .example-button {
      grid-column: 2 / -1;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 8px;
      align-items: start;
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #f6d8e3;
      border-radius: 13px;
      color: #60434e;
      background: #fff9fb;
      cursor: pointer;
      font: inherit;
      font-family: "Yu Gothic", "Hiragino Sans", sans-serif;
      font-size: .94rem;
      font-weight: 800;
      line-height: 1.6;
      text-align: left;
      transition: transform .16s ease, background .16s ease, border-color .16s ease;
    }
    .example-button:hover, .example-button:focus-visible { border-color: var(--pink-400); background: white; transform: translateY(-1px); outline: none; }
    .example-button.speaking { border-color: #75c8a4; background: #edfbf4; }
    .example-label { color: var(--pink-600); font-size: .78rem; font-weight: 900; white-space: nowrap; }
    .sandy-tip { margin: 17px 0 0; padding: 13px 15px; border: 1px solid rgba(238,121,164,.16); border-radius: 18px; color: var(--muted); background: rgba(255,255,255,.82); font-size: .86rem; line-height: 1.7; }
    .empty { display: none; padding: 30px; border-radius: 18px; color: var(--muted); background: rgba(255,255,255,.8); text-align: center; font-weight: 800; }
    .floating-controls { position: fixed; z-index: 20; right: max(16px, env(safe-area-inset-right)); bottom: max(16px, env(safe-area-inset-bottom)); display: grid; gap: 7px; justify-items: end; pointer-events: none; }
    .floating-controls > * { pointer-events: auto; }
    .floating-scroll-toggle { padding: 13px 16px; border-radius: 999px; box-shadow: 0 12px 28px rgba(82,123,210,.24); }
    .floating-progress { max-width: 270px; padding: 6px 10px; border: 1px solid #f0c9d7; border-radius: 999px; color: var(--muted); background: rgba(255,255,255,.92); box-shadow: 0 8px 18px rgba(157,68,103,.12); font-size: .76rem; font-weight: 900; text-align: center; }

    @media (max-width: 780px) {
      .toolbar { grid-template-columns: 1fr; }
      .voice-picker { justify-content: space-between; }
      .voice-picker select { max-width: min(100%, 260px); }
      .entry { grid-template-columns: 48px 1fr; }
      .meaning, .tag, .favorite-button, .example-button { grid-column: 2; }
      .favorite-button { justify-self: start; }
      .notebook-header { display: grid; }
      .floating-controls { left: 16px; right: 16px; justify-items: stretch; }
      .floating-scroll-toggle { width: 100%; }
      .floating-progress { justify-self: center; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div class="eyebrow">N2 GRAMMAR LIST</div>
      <h1>N2 押题语法表</h1>
      <p class="subtitle">根据你给的图片整理成 99 个语法卡片；点句型或例句会朗读日语，中文解释不会朗读。</p>
      <div class="account" id="account">
        <span id="accountStatus">登录后会云同步语法进度和错题本。</span>
        <a id="loginLink" href="login.html?redirect=grammar.html">Sign in</a>
        <button id="accountAction" type="button">Sign out</button>
      </div>
      <nav class="nav" aria-label="学习页面">
        <a href="index.html">🐾 回到 Sandy 练习</a>
        <a href="vocab.html">📚 N2 词汇表</a>
      </nav>
    </header>

    <section class="toolbar" aria-label="语法工具">
      <input class="search" id="search" type="search" placeholder="搜索语法、中文意思或例句，例如：からには / 既然 / 合格">
      <label class="voice-picker">日语声音<select id="voiceSelect" aria-label="选择日文语音"><option>载入中…</option></select></label>
      <button class="sound-toggle" id="soundToggle" type="button" aria-pressed="true">🔊 语音：开</button>
      <button class="favorite-filter" id="favoritesToggle" type="button" aria-pressed="false">⭐ 错题本 0</button>
      <button class="scroll-toggle" id="scrollToggle" data-scroll-toggle type="button" aria-pressed="false">▶ 自动听读</button>
    </section>

    <section class="notebook-panel" id="notebookPanel" aria-label="收藏错题本">
      <div class="notebook-header">
        <div class="notebook-title">
          <span>⭐ 我的语法错题本</span>
          <span class="notebook-help" id="notebookHelp">点语法卡上的“收藏”就会放进这里；以后想再点一遍，可以直接跳回去。</span>
        </div>
        <button class="clear-favorites" id="clearFavorites" type="button">清空错题本</button>
      </div>
      <div class="notebook-list" id="notebookList"></div>
    </section>

    <p class="status" id="status">共 99 个语法</p>
    <section class="list" id="list" aria-live="polite"></section>
    <p class="empty" id="empty">没有找到这个语法。换个关键词试试看。</p>
    <p class="sandy-tip">小提示：点整张卡片可以读“句型 + 例句”，再点同一张会暂停。自动听读会从你上次进度开始，先读句型，再读例句，然后继续下一张。</p>
  </main>
  <div class="floating-controls" aria-label="悬浮学习控制">
    <span class="floating-progress" id="floatingProgress">进度：还没开始</span>
    <button class="scroll-toggle floating-scroll-toggle" id="floatingScrollToggle" data-scroll-toggle type="button" aria-pressed="false">▶ 自动听读</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const grammarItems = [
      { id: 1, group: "20+ 真题高频", pattern: "〜からといって", meaning: "虽说……也不能……；不能仅因为……就……", example: "美味しいからといって、食べ過ぎてはいけない。" },
      { id: 2, group: "20+ 真题高频", pattern: "〜からには", meaning: "既然……就……", example: "受験するからには、合格を目指して頑張りたい。" },
      { id: 3, group: "20+ 真题高频", pattern: "〜おかげで", meaning: "多亏……；因为……而得到好结果", example: "先生のおかげで、苦手だった文法が分かるようになった。" },
      { id: 4, group: "20+ 真题高频", pattern: "〜せいだ", meaning: "都是因为……；不好的原因，带责怪语气", example: "寝不足のせいで、今日は頭がぼんやりしている。" },
      { id: 5, group: "20+ 真题高频", pattern: "〜たところで", meaning: "即使……也……；就算做了也没有好结果", example: "今から急いだところで、始発には間に合わない。" },
      { id: 6, group: "20+ 真题高频", pattern: "〜どころか", meaning: "岂止……；哪谈得上……，甚至……", example: "疲れすぎて、歩くどころか立つこともできない。" },
      { id: 7, group: "20+ 真题高频", pattern: "〜ながら", meaning: "一边……一边……；虽然……但是……", example: "彼は知っていながら、何も教えてくれなかった。" },
      { id: 8, group: "20+ 真题高频", pattern: "〜うちに", meaning: "趁着……；在……期间", example: "若いうちに、いろいろな経験をしておきたい。" },
      { id: 9, group: "20+ 真题高频", pattern: "〜としたら / 〜とすれば", meaning: "如果……的话；轻微假定", example: "留学するとしたら、まず生活費を計算しなければならない。" },
      { id: 10, group: "20+ 真题高频", pattern: "〜として / 〜としては / 〜としても", meaning: "作为……；即使作为……也……", example: "学生として、自分の意見をきちんと述べたい。" },
      { id: 11, group: "20+ 真题高频", pattern: "〜に関して / 〜に関する", meaning: "关于……；有关……", example: "試験に関して分からないことがあれば、先生に聞いてください。" },
      { id: 12, group: "20+ 真题高频", pattern: "〜に対して / 〜に対する", meaning: "对……；对于……", example: "上司に対して、失礼な言い方をしてしまった。" },
      { id: 13, group: "20+ 真题高频", pattern: "〜をめぐって / 〜をめぐる", meaning: "围绕……；关于……发生讨论或争论", example: "新しい制度をめぐって、社内で議論が続いている。" },
      { id: 14, group: "20+ 真题高频", pattern: "〜さえすれば", meaning: "只要……就……", example: "毎日少しずつ復習さえすれば、力は必ずついてくる。" },
      { id: 15, group: "20+ 真题高频", pattern: "〜も〜ば〜も", meaning: "既……又……", example: "この町は景色もよければ、食べ物もおいしい。" },
      { id: 16, group: "20+ 真题高频", pattern: "〜ように", meaning: "为了……；以便……", example: "忘れないように、予定を手帳に書いておいた。" },
      { id: 17, group: "20+ 真题高频", pattern: "〜わけではない / 〜わけでもない", meaning: "并不是……；并不会……", example: "日本語が話せるからといって、敬語が上手なわけではない。" },
      { id: 18, group: "20+ 真题高频", pattern: "〜わけにはいかない / 〜わけにもいかない", meaning: "不能……；也不能……", example: "明日は試験なので、今夜遊びに行くわけにはいかない。" },
      { id: 19, group: "20+ 真题高频", pattern: "〜だけ / 〜だけあって / 〜だけに / 〜だけの", meaning: "正因为……；到底是……；毕竟……", example: "経験が長いだけあって、彼の説明はとても分かりやすい。" },
      { id: 20, group: "20+ 真题高频", pattern: "〜ないことには〜ない", meaning: "不……就不能……", example: "実物を見ないことには、買うかどうか決められない。" },
      { id: 21, group: "10+ 重要语法", pattern: "〜しかない", meaning: "只好……；只有……", example: "電車が止まったので、歩いて帰るしかない。" },
      { id: 22, group: "10+ 重要语法", pattern: "〜にすぎない", meaning: "只不过是……", example: "これは一つの例にすぎない。" },
      { id: 23, group: "10+ 重要语法", pattern: "〜にほかならない", meaning: "无非是……；正是……", example: "今回の成功は、皆の努力の結果にほかならない。" },
      { id: 24, group: "10+ 重要语法", pattern: "〜ずにはいられない", meaning: "不能不……；忍不住……", example: "その話を聞いて、笑わずにはいられなかった。" },
      { id: 25, group: "10+ 重要语法", pattern: "〜ないことはない / 〜ないこともない", meaning: "不是不……；也不是没有可能……", example: "少し高いが、買えないこともない。" },
      { id: 26, group: "10+ 重要语法", pattern: "〜ほかない / 〜よりほかない", meaning: "只有……；不得不……", example: "ここまで来たら、最後までやるほかない。" },
      { id: 27, group: "10+ 重要语法", pattern: "〜のみならず", meaning: "不仅……而且……", example: "彼は日本語のみならず、英語も流暢に話せる。" },
      { id: 28, group: "10+ 重要语法", pattern: "たとえ〜ても", meaning: "即使……也……", example: "たとえ失敗しても、もう一度挑戦したい。" },
      { id: 29, group: "10+ 重要语法", pattern: "〜ば〜ほど", meaning: "越……越……", example: "勉強すればするほど、日本語が面白くなる。" },
      { id: 30, group: "10+ 重要语法", pattern: "〜ことに / 〜ことには", meaning: "令人……的是……", example: "驚いたことに、彼は一晩でその本を読み終えた。" },
      { id: 31, group: "10+ 重要语法", pattern: "〜ことだから", meaning: "因为是……，所以想必……", example: "真面目な彼のことだから、きっと約束を守るだろう。" },
      { id: 32, group: "10+ 重要语法", pattern: "〜かねない", meaning: "有可能……；可能会导致坏结果", example: "このまま放っておくと、大きな問題になりかねない。" },
      { id: 33, group: "10+ 重要语法", pattern: "〜次第", meaning: "一……就……；取决于……", example: "結果が分かり次第、すぐに連絡します。" },
      { id: 34, group: "10+ 重要语法", pattern: "一方 / 一方で / 一方では", meaning: "一方面……另一方面……", example: "この町は便利な一方で、家賃が高い。" },
      { id: 35, group: "10+ 重要语法", pattern: "〜一方だ", meaning: "越来越……；一直朝某方向发展", example: "仕事の量は増える一方だ。" },
      { id: 36, group: "10+ 重要语法", pattern: "〜にかけては / 〜にかけても", meaning: "在……方面；说到……", example: "料理にかけては、彼にかなう人はいない。" },
      { id: 37, group: "10+ 重要语法", pattern: "〜によって / 〜により / 〜による", meaning: "由于……；根据……；被……", example: "結果は努力によって大きく変わる。" },
      { id: 38, group: "10+ 重要语法", pattern: "〜にあたって / 〜にあたり", meaning: "在……之际", example: "発表にあたって、資料をもう一度確認した。" },
      { id: 39, group: "10+ 重要语法", pattern: "〜にしては", meaning: "照……来说；作为……却……", example: "初めてにしては、よくできている。" },
      { id: 40, group: "10+ 重要语法", pattern: "〜に限って / 〜に限り / 〜に限らず", meaning: "只限……；不仅限于……", example: "このサービスは学生に限り、無料で利用できる。" },

    function speakJapanese(text, button, options = {}) {
      if (!soundEnabled || !("SpeechSynthesisUtterance" in window)) return Promise.resolve(false);
      return new Promise((resolve) => {
        if (options.cancelCurrent !== false) window.speechSynthesis.cancel();
        window.speechSynthesis.resume();
        document.querySelectorAll(".speaking").forEach((item) => item.classList.remove("speaking"));
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = "ja-JP";
        utterance.rate = 0.82;
        utterance.pitch = 1;
        const selected = $("voiceSelect").value;
        const voice = japaneseVoices.find((item) => item.name === selected) || japaneseVoices.find((item) => /siri|kyoko|haruka|nanami|female/i.test(item.name)) || japaneseVoices[0];
        if (voice) utterance.voice = voice;
        if (button) button.classList.add("speaking");
        let finished = false;
        const finish = () => {
          if (finished) return;
          finished = true;
          clearTimeout(fallbackTimer);
          if (button) button.classList.remove("speaking");
          resolve(true);
        };
        const fallbackTimer = setTimeout(finish, Math.min(16000, Math.max(2400, text.length * 230)));
        utterance.onend = finish;
        utterance.onerror = finish;
        window.speechSynthesis.speak(utterance);
      });
    }

    function updateFavoriteControls() {
      const count = favoriteIds.size;
      $("favoritesToggle").setAttribute("aria-pressed", String(favoritesOnly));
      $("favoritesToggle").textContent = favoritesOnly ? `★ 看全部 (${count})` : `⭐ 错题本 ${count}`;
      $("clearFavorites").disabled = count === 0;
      $("notebookHelp").textContent = count ? `已收藏 ${count} 个语法。点下面的小标签可以直接跳回那张卡。` : "点语法卡上的“收藏”就会放进这里；以后想再点一遍，可以直接跳回去。";
      const list = $("notebookList");
      list.innerHTML = "";
      if (!count) {
        const empty = document.createElement("span");
        empty.className = "notebook-empty";
        empty.textContent = "还没有收藏。看到想复习的语法，就点一下 ☆ 收藏。";
        list.appendChild(empty);
        return;
      }
      [...favoriteIds].sort((a, b) => a - b).forEach((id) => {
        const item = grammarItems.find((grammarItem) => grammarItem.id === id);
        if (!item) return;
        const chip = document.createElement("button");
        chip.className = "notebook-chip";
        chip.type = "button";
        chip.textContent = `${String(item.id).padStart(3, "0")} ${item.pattern}`;
        chip.setAttribute("aria-label", `跳到语法：${item.pattern}`);
        chip.addEventListener("click", () => {
          stopAutoScroll();
          stopCardReview();
          jumpToGrammar(item.id);
        });
        list.appendChild(chip);
      });
    }

    function toggleFavorite(id, article, button) {
      const numericId = Number(id);
      if (!Number.isInteger(numericId) || numericId < 1 || numericId > grammarItems.length) return;
      const wasFavorite = favoriteIds.has(numericId);
      if (wasFavorite) {
        favoriteIds.delete(numericId);
        removeFavoriteFromCloud(numericId);
      } else {
        favoriteIds.add(numericId);
        saveFavoriteToCloud(numericId);
      }
      saveFavorites();
      saveLastViewed(numericId);
      if (button) updateFavoriteButton(button, numericId);
      if (article) article.classList.toggle("favorited", isFavorite(numericId));
      updateFavoriteControls();
      if (favoritesOnly && !isFavorite(numericId)) renderList();
    }

    function clearFavorites() {
      if (!favoriteIds.size) return;
      const ok = window.confirm("要清空整个语法错题本吗？这只会删除收藏记录，不会删除语法表。");
      if (!ok) return;
      const idsToDelete = [...favoriteIds];
      favoriteIds = new Set();
      saveFavorites();
      renderList();
      if (supabaseClient && signedInUser && idsToDelete.length) {
        supabaseClient.from("mistake_notebook").delete()
          .eq("user_id", signedInUser.id)
          .in("question_id", idsToDelete.map(cloudId))
          .then(({ error }) => { if (error) console.warn("Could not clear grammar cloud favorites", error); });
      }
    }

    function loadLastViewed() {
      try {
        const saved = Number(localStorage.getItem(progressKey));
        return Number.isInteger(saved) && saved >= 1 && saved <= grammarItems.length ? saved : null;
      } catch {
        return null;
      }
    }

    function saveLastViewed(id, options = {}) {
      const numericId = Number(id);
      if (!Number.isInteger(numericId) || numericId < 1 || numericId > grammarItems.length) return;
      try { localStorage.setItem(progressKey, String(numericId)); } catch {}
      updateFloatingProgress(numericId);
      if (options.syncCloud !== false) queueCloudProgressSave(numericId);
    }

    function updateFloatingProgress(id) {
      const progress = $("floatingProgress");
      const item = grammarItems.find((grammarItem) => grammarItem.id === Number(id));
      progress.textContent = item ? `进度：${String(item.id).padStart(3, "0")} / ${grammarItems.length}　${item.pattern}` : "进度：还没开始";
    }

    function currentCenterEntry() {
      const entries = [...document.querySelectorAll(".entry")];
      const centerY = window.innerHeight * 0.48;
      return entries
        .filter((entry) => {
          const rect = entry.getBoundingClientRect();
          return rect.bottom > 0 && rect.top < window.innerHeight;
        })
        .sort((a, b) => {
          const rectA = a.getBoundingClientRect();
          const rectB = b.getBoundingClientRect();
          return Math.abs((rectA.top + rectA.bottom) / 2 - centerY) - Math.abs((rectB.top + rectB.bottom) / 2 - centerY);
        })[0] || null;
    }

    function saveVisibleProgress() {
      scrollSaveFrame = null;
      const entry = currentCenterEntry();
      if (entry) saveLastViewed(entry.dataset.grammarId);
    }
    function scheduleProgressSave() {
      if (scrollSaveFrame) return;
      scrollSaveFrame = requestAnimationFrame(saveVisibleProgress);
    }

    function restoreLastViewedPosition() {
      if ($("search").value.trim()) return;
      const saved = loadLastViewed();
      updateFloatingProgress(saved);
      if (!saved) return;
      const entry = document.querySelector(`[data-grammar-id="${saved}"]`);
      if (!entry) return;
      setTimeout(() => {
        entry.scrollIntoView({ behavior: "smooth", block: "center" });
        entry.classList.add("playing");
        setTimeout(() => entry.classList.remove("playing"), 900);
      }, 180);
    }

    async function playCardReview(entry, item, token) {
      if (!cardReviewActive || token !== cardReviewToken) return;
      if (!soundEnabled && "speechSynthesis" in window) {
        soundEnabled = true;
        updateSoundToggle();
      }
      document.querySelectorAll(".entry.playing").forEach((node) => node.classList.remove("playing"));
      entry.classList.add("playing");
      saveLastViewed(item.id);
      entry.scrollIntoView({ behavior: "smooth", block: "center" });
      await delay(320);
      if (!cardReviewActive || token !== cardReviewToken) return;
      await speakJapanese(speechPattern(item), entry.querySelector(".pattern-button"));
      if (!cardReviewActive || token !== cardReviewToken) return;
      await delay(180);
      if (!cardReviewActive || token !== cardReviewToken) return;
      await speakJapanese(item.example, entry.querySelector(".example-button"));
      if (!cardReviewActive || token !== cardReviewToken) return;
      stopCardReview();
    }

    function startCardReview(entry, item) {
      stopAutoScroll();
      stopCardReview();
      cardReviewActive = true;
      activeCardId = item.id;
      cardReviewToken++;
      playCardReview(entry, item, cardReviewToken);
    }
    function stopCardReview() {
      if (!cardReviewActive && activeCardId === null) return;
      cardReviewActive = false;
      activeCardId = null;
      cardReviewToken++;
      clearTimeout(autoReviewTimer);
      if ("speechSynthesis" in window) window.speechSynthesis.cancel();
      document.querySelectorAll(".speaking, .entry.playing").forEach((item) => item.classList.remove("speaking", "playing"));
    }
    function toggleCardReview(entry, item) {
      if (cardReviewActive && activeCardId === item.id) { stopCardReview(); return; }
      startCardReview(entry, item);
    }
    function updateScrollToggle() {
      document.querySelectorAll("[data-scroll-toggle]").forEach((toggle) => {
        toggle.setAttribute("aria-pressed", String(autoScrollActive));
        toggle.textContent = autoScrollActive ? "⏸ 停止听读" : "▶ 自动听读";
      });
    }
    function firstVisibleEntryIndex(entries) {
      const visibleIndex = entries.findIndex((entry) => entry.getBoundingClientRect().bottom > 120);
      return Math.max(0, visibleIndex);
    }
    function autoReviewStartIndex(entries) {
      const saved = loadLastViewed();
      if (saved) {
        const savedIndex = entries.findIndex((entry) => Number(entry.dataset.grammarId) === Number(saved));
        if (savedIndex >= 0) return savedIndex;
      }
      return firstVisibleEntryIndex(entries);
    }

    async function playAutoReview(token) {
      const entries = [...document.querySelectorAll(".entry")];
      if (!autoScrollActive || token !== autoReviewToken) return;
      if (!entries.length || autoReviewIndex >= entries.length) { stopAutoScroll(); return; }
      const entry = entries[autoReviewIndex];
      const item = grammarItems.find((grammarItem) => String(grammarItem.id) === entry.dataset.grammarId);
      if (!item) { autoReviewIndex++; playAutoReview(token); return; }

      document.querySelectorAll(".entry.playing").forEach((node) => node.classList.remove("playing"));
      entry.classList.add("playing");
      saveLastViewed(item.id);
      entry.scrollIntoView({ behavior: "smooth", block: "center" });
      await delay(450);
      if (!autoScrollActive || token !== autoReviewToken) return;
      await speakJapanese(speechPattern(item), entry.querySelector(".pattern-button"));
      if (!autoScrollActive || token !== autoReviewToken) return;
      await delay(220);
      if (!autoScrollActive || token !== autoReviewToken) return;
      await speakJapanese(item.example, entry.querySelector(".example-button"));
      if (!autoScrollActive || token !== autoReviewToken) return;
      await delay(520);
      if (!autoScrollActive || token !== autoReviewToken) return;
      entry.classList.remove("playing");
      autoReviewIndex++;
      playAutoReview(token);
    }

    function startAutoScroll() {
      if (autoScrollActive) return;
      if (!soundEnabled && "speechSynthesis" in window) {
        soundEnabled = true;
        updateSoundToggle();
      }
      stopCardReview();
      autoScrollActive = true;
      autoReviewToken++;
      const entries = [...document.querySelectorAll(".entry")];
      if (!entries.length) { stopAutoScroll(); return; }
      autoReviewIndex = autoReviewStartIndex(entries);
      updateScrollToggle();
      playAutoReview(autoReviewToken);
    }
    function stopAutoScroll() {
      if (!autoScrollActive) return;
      autoScrollActive = false;
      autoReviewToken++;
      clearTimeout(autoReviewTimer);
      if ("speechSynthesis" in window) window.speechSynthesis.cancel();
      document.querySelectorAll(".speaking, .entry.playing").forEach((item) => item.classList.remove("speaking", "playing"));
      updateScrollToggle();
    }
    function toggleAutoScroll() { if (autoScrollActive) stopAutoScroll(); else startAutoScroll(); }

    function updateSoundToggle() {
      const toggle = $("soundToggle");
      toggle.setAttribute("aria-pressed", String(soundEnabled));
      toggle.textContent = soundEnabled ? "🔊 语音：开" : "🔇 语音：关";
      if (!("speechSynthesis" in window)) {
        toggle.textContent = "语音不支援";
        toggle.disabled = true;
      }
    }
    function loadVoices() {
      const select = $("voiceSelect");
      let savedVoice = "";
      try { savedVoice = localStorage.getItem("n2-grammar-list-voice") || ""; } catch {}
      const previous = savedVoice || select.value;
      japaneseVoices = window.speechSynthesis ? window.speechSynthesis.getVoices().filter((voice) => voice.lang.toLowerCase().startsWith("ja")) : [];
      select.innerHTML = "";
      if (!japaneseVoices.length) {
        select.innerHTML = "<option value=\"\">装置预设</option>";
        return;
      }
      japaneseVoices.forEach((voice) => {
        const option = document.createElement("option");
        option.value = voice.name;
        option.textContent = voice.name;
        select.appendChild(option);
      });
      const preferred = japaneseVoices.find((voice) => voice.name === previous) || japaneseVoices.find((voice) => /siri|kyoko|haruka|nanami|female/i.test(voice.name)) || japaneseVoices[0];
      select.value = preferred.name;
    }

    $("search").addEventListener("input", () => {
      stopAutoScroll();
      stopCardReview();
      renderList();
    });
    $("favoritesToggle").addEventListener("click", () => {
      stopAutoScroll();
      stopCardReview();
      favoritesOnly = !favoritesOnly;
      $("search").value = "";
      renderList();
      if (!favoritesOnly) restoreLastViewedPosition();
    });
    $("clearFavorites").addEventListener("click", () => {
      stopAutoScroll();
      stopCardReview();
      clearFavorites();
    });
    document.querySelectorAll("[data-scroll-toggle]").forEach((toggle) => {
      toggle.addEventListener("click", toggleAutoScroll);
      toggle.addEventListener("touchstart", (event) => event.stopPropagation(), { passive: true });
      toggle.addEventListener("pointerdown", (event) => event.stopPropagation());
    });
    $("soundToggle").addEventListener("click", () => {
      soundEnabled = !soundEnabled;
      if (!soundEnabled && "speechSynthesis" in window) window.speechSynthesis.cancel();
      updateSoundToggle();
    });
    $("voiceSelect").addEventListener("change", () => {
      try { localStorage.setItem("n2-grammar-list-voice", $("voiceSelect").value); } catch {}
    });
    $("accountAction").addEventListener("click", () => {
      if (supabaseClient) supabaseClient.auth.signOut();
    });

    updateSoundToggle();
    updateScrollToggle();
    updateAccountUI();
    loadVoices();
    if ("speechSynthesis" in window) window.speechSynthesis.addEventListener("voiceschanged", loadVoices);
    window.addEventListener("scroll", scheduleProgressSave, { passive: true });
    window.addEventListener("wheel", stopAutoScroll, { passive: true });
    window.addEventListener("touchstart", stopAutoScroll, { passive: true });
    window.addEventListener("keydown", (event) => {
      if (["ArrowDown", "ArrowUp", "PageDown", "PageUp", "Home", "End", " "].includes(event.key)) stopAutoScroll();
    });
    renderList();
    restoreLastViewedPosition();
    if (supabaseClient) {
      supabaseClient.auth.onAuthStateChange((_event, session) => {
        signedInUser = session?.user || null;
        cloudReady = false;
        updateAccountUI();
        if (signedInUser) loadCloudState();
      });
    }
    initialiseAccount();
  </script>
</body>
</html>
