<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>N2 副词・接续词表｜Study with Sandy</title>
  <style>
    :root {
      --pink-50: #f2fbff;
      --pink-100: #dff5ff;
      --pink-200: #bfeeff;
      --pink-400: #5ec4ea;
      --pink-600: #1f8fb9;
      --blue-100: #d8f2ff;
      --blue-500: #247fb7;
      --ink: #16384a;
      --muted: #5a7f92;
      --shadow: 0 18px 50px rgba(30, 127, 170, .16);
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Hiragino Sans", "Yu Gothic", sans-serif;
      background: radial-gradient(circle at 12% 10%, rgba(255,255,255,.95) 0 9%, transparent 9.5%),
                  radial-gradient(circle at 88% 14%, rgba(190,238,255,.72) 0 13%, transparent 13.5%),
                  radial-gradient(circle at 18% 84%, rgba(112,207,238,.28) 0 18%, transparent 18.5%),
                  linear-gradient(135deg, #f7fdff 0%, #e7f8ff 45%, #dff4ff 72%, #f7fbff 100%);
      background-attachment: fixed;
    }
    .app { width: min(1040px, calc(100% - 32px)); margin: 0 auto; padding: 24px 0 52px; }
    header { text-align: center; margin-bottom: 16px; }
    .eyebrow { color: var(--pink-600); font-size: .7rem; font-weight: 950; letter-spacing: .14em; }
    h1 { margin: 5px 0 5px; font-size: clamp(1.65rem, 5vw, 2.45rem); letter-spacing: .02em; }
    .subtitle { margin: 0; color: var(--muted); font-size: .92rem; line-height: 1.7; }
    header::after { content: "𓇼 ⋆｡˚ 𓆝 ⋆｡˚"; display: block; margin-top: 8px; color: rgba(36,127,183,.42); font-size: .88rem; letter-spacing: .12em; }
    .nav { display: flex; justify-content: center; gap: 8px; margin-top: 11px; flex-wrap: wrap; }
    .nav a { padding: 7px 12px; border: 1px solid #bfe9f7; border-radius: 999px; color: var(--pink-600); background: rgba(255,255,255,.78); font-size: .8rem; font-weight: 950; text-decoration: none; }
    .nav a:hover { background: white; box-shadow: 0 7px 18px rgba(28,111,145,.12); }
    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 10px;
      align-items: center;
      margin: 0 0 14px;
      padding: 12px;
      border: 1px solid rgba(75,177,218,.18);
      border-radius: 20px;
      background: rgba(255,255,255,.84);
      box-shadow: var(--shadow);
    }
    .search {
      min-width: 0;
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #bfe9f7;
      border-radius: 13px;
      color: var(--ink);
      background: white;
      font: inherit;
      font-weight: 800;
    }
    .voice-picker { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-size: .8rem; font-weight: 900; white-space: nowrap; }
    .voice-picker select { max-width: 170px; border: 1px solid #bfe9f7; border-radius: 9px; padding: 8px; color: var(--pink-600); background: white; font: inherit; }
    .sound-toggle, .auto-toggle {
      border: 0;
      padding: 10px 12px;
      border-radius: 12px;
      color: white;
      background: linear-gradient(135deg, #70d5f4, #2b9ccd);
      cursor: pointer;
      font: inherit;
      font-weight: 950;
      white-space: nowrap;
    }
    .auto-toggle { background: linear-gradient(135deg, #7ea0f0, #527bd2); }
    .sound-toggle[aria-pressed="false"], .auto-toggle[aria-pressed="false"] { color: var(--muted); background: #f4edf0; }
    .floating-controls {
      position: fixed;
      z-index: 20;
      right: max(16px, env(safe-area-inset-right));
      bottom: max(16px, env(safe-area-inset-bottom));
      display: grid;
      gap: 7px;
      justify-items: end;
      pointer-events: none;
    }
    .floating-controls > * { pointer-events: auto; }
    .floating-progress {
      max-width: 220px;
      padding: 6px 10px;
      border: 1px solid #bfe9f7;
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255,255,255,.93);
      box-shadow: 0 8px 18px rgba(28,111,145,.12);
      font-size: .76rem;
      font-weight: 900;
      text-align: center;
    }
    .floating-sandy-toggle {
      display: grid;
      justify-items: center;
      width: 104px;
      padding: 0;
      border: 0;
      color: var(--pink-600);
      background: transparent;
      cursor: grab;
      font: inherit;
      font-weight: 900;
      user-select: none;
      touch-action: none;
    }
    .floating-sandy-toggle:active, .floating-controls.dragging .floating-sandy-toggle { cursor: grabbing; }
    .floating-sandy-bubble {
      max-width: 148px;
      margin: 0 0 6px;
      padding: 8px 10px;
      border: 1px solid #bfe9f7;
      border-radius: 15px 15px 15px 5px;
      color: #326b80;
      background: rgba(255,255,255,.95);
      box-shadow: 0 8px 18px rgba(28,111,145,.13);
      font-size: .75rem;
      line-height: 1.35;
      text-align: center;
    }
    .floating-sandy-image {
      width: 82px;
      height: 82px;
      object-fit: contain;
      filter: drop-shadow(0 8px 9px rgba(17,90,120,.2));
    }
    .floating-sandy-toggle:focus-visible { outline: 2px solid rgba(75,177,218,.55); outline-offset: 6px; border-radius: 18px; }
    .floating-sandy-status {
      margin-top: 3px;
      padding: 4px 8px;
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255,255,255,.9);
      box-shadow: 0 6px 12px rgba(28,111,145,.1);
      font-size: .68rem;
      letter-spacing: .02em;
    }
    .floating-sandy-toggle[aria-pressed="true"] .floating-sandy-bubble {
      color: white;
      border-color: rgba(94,196,234,.5);
      background: linear-gradient(135deg, #70d5f4, #2b9ccd);
    }
    .floating-sandy-toggle[aria-pressed="true"] .floating-sandy-status { color: #1f8fb9; background: #e8faff; }
    .filter-panel {
      margin: 0 0 14px;
      border: 1px solid rgba(75,177,218,.18);
      border-radius: 18px;
      background: rgba(255,255,255,.78);
      box-shadow: 0 10px 26px rgba(28,111,145,.08);
      overflow: hidden;
    }
    .filter-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      width: 100%;
      border: 0;
      padding: 12px 14px;
      color: var(--ink);
      background: linear-gradient(135deg, rgba(255,255,255,.94), rgba(223,245,255,.78));
      cursor: pointer;
      font: inherit;
      font-weight: 950;
      text-align: left;
    }
    .filter-summary {
      color: var(--blue-500);
      font-size: .8rem;
      font-weight: 950;
      text-align: right;
    }
    .filter-toggle .chevron { color: var(--pink-600); transition: transform .18s ease; }
    .filter-toggle[aria-expanded="true"] .chevron { transform: rotate(180deg); }
    .categories { display: grid; gap: 12px; padding: 12px; border-top: 1px solid rgba(75,177,218,.15); }
    .categories.collapsed { display: none; }
    .category-actions { display: flex; flex-wrap: wrap; gap: 8px; }
    .category-group { display: grid; gap: 7px; padding: 10px; border: 1px solid rgba(75,177,218,.14); border-radius: 15px; background: rgba(247,253,255,.72); }
    .category-group-title { display: flex; align-items: center; justify-content: space-between; gap: 8px; color: var(--ink); font-size: .8rem; font-weight: 950; }
    .category-group-meta { display: inline-flex; align-items: center; gap: 7px; flex-wrap: wrap; justify-content: flex-end; }
    .category-count { color: var(--muted); font-size: .72rem; font-weight: 900; }
    .category-group-select {
      border: 1px solid #bfe9f7;
      border-radius: 999px;
      padding: 5px 9px;
      color: var(--blue-500);
      background: #eef9ff;
      cursor: pointer;
      font: inherit;
      font-size: .72rem;
      font-weight: 950;
    }
    .category-group-select[aria-pressed="true"] { color: white; border-color: transparent; background: linear-gradient(135deg, #7ea0f0, #527bd2); }
    .category-group-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .category {
      border: 1px solid #bfe9f7;
      border-radius: 999px;
      padding: 8px 11px;
      color: var(--pink-600);
      background: white;
      cursor: pointer;
      font: inherit;
      font-size: .82rem;
      font-weight: 950;
    }
    .category[aria-pressed="true"] { color: white; border-color: transparent; background: linear-gradient(135deg, #70d5f4, #2b9ccd); }
    .category.clear { color: var(--blue-500); background: #eef9ff; }
    .status { margin: 0 4px 12px; color: var(--muted); font-size: .86rem; font-weight: 900; }
    .list { display: grid; gap: 10px; }
    .entry {
      display: grid;
      grid-template-columns: 64px minmax(170px, .8fr) minmax(180px, .9fr) minmax(260px, 1.25fr);
      gap: 12px;
      align-items: center;
      padding: 12px;
      border: 1px solid rgba(75,177,218,.16);
      border-radius: 18px;
      background: rgba(255,255,255,.9);
      box-shadow: 0 8px 22px rgba(28,111,145,.08);
    }
    .entry.playing { border-color: rgba(117,200,164,.75); box-shadow: 0 12px 28px rgba(75,150,114,.16); transform: translateY(-1px); }
    .num { color: var(--muted); font-size: .85rem; font-weight: 950; text-align: center; }
    .term-button {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--pink-200);
      border-radius: 13px;
      color: var(--pink-600);
      background: var(--pink-50);
      cursor: pointer;
      font: inherit;
      font-family: "Yu Gothic", "Hiragino Sans", sans-serif;
      font-size: 1.12rem;
      font-weight: 950;
      text-align: left;
    }
    .term-button:hover, .term-button:focus-visible { border-color: var(--pink-400); background: white; outline: none; }
    .term-button.speaking, .example-button.speaking { border-color: #75c8a4; background: #edfbf4; }
    .reading { color: var(--blue-500); font-family: "Yu Gothic", "Hiragino Sans", sans-serif; font-size: .96rem; font-weight: 950; }
    .meaning { color: #315b70; line-height: 1.6; font-size: .94rem; }
    .tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: fit-content;
      padding: 4px 9px;
      border: 0;
      border-radius: 999px;
      color: var(--blue-500);
      background: var(--blue-100);
      cursor: pointer;
      font: inherit;
      font-size: .75rem;
      font-weight: 950;
      text-decoration: none;
    }
    .tag:hover, .tag:focus-visible { color: white; background: linear-gradient(135deg, #70d5f4, #2b9ccd); outline: none; }
    .point { color: var(--muted); font-size: .82rem; font-weight: 800; line-height: 1.55; }
    .meta { display: grid; gap: 5px; }
    .example-button {
      grid-column: 2 / -1;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 8px;
      align-items: start;
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #cdeefa;
      border-radius: 13px;
      color: #244f63;
      background: #f7fdff;
      cursor: pointer;
      font: inherit;
      font-family: "Yu Gothic", "Hiragino Sans", sans-serif;
      font-size: .94rem;
      font-weight: 850;
      line-height: 1.6;
      text-align: left;
    }
    .example-label { color: var(--pink-600); font-size: .78rem; font-weight: 950; white-space: nowrap; }
    .empty { display: none; padding: 30px; border-radius: 18px; color: var(--muted); background: rgba(255,255,255,.8); text-align: center; font-weight: 900; }
    .tip { margin: 17px 0 0; padding: 13px 15px; border: 1px solid rgba(75,177,218,.16); border-radius: 18px; color: var(--muted); background: rgba(255,255,255,.82); font-size: .86rem; line-height: 1.7; }
    @media (max-width: 820px) {
      .toolbar { grid-template-columns: 1fr; }
      .voice-picker { justify-content: space-between; }
      .entry { grid-template-columns: 48px 1fr; }
      .meta, .meaning, .point, .example-button { grid-column: 2; }
      .floating-controls { left: 16px; right: 16px; justify-items: end; }
      .floating-progress { justify-self: center; }
      .floating-sandy-toggle { width: 98px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div class="eyebrow">N2 ADVERBS & CONNECTORS</div>
      <h1>N2 副词・接续词表</h1>
      <p class="subtitle">基于你提供的 2020-2025 真题整理表；每个项目都补了日语例句，点日语或例句可以朗读。</p>
      <nav class="nav" aria-label="学习页面">
        <a href="index.html">🐾 二选一陷阱</a>
        <a href="grammar-quiz.html">🐾 语法四选一</a>
        <a href="vocab.html">📚 N2 词汇表</a>
        <a href="core-grammar.html">🌊 核心语法表</a>
        <a href="grammar.html">📝 N2 语法表</a>
        <a href="mistakes.html">📘 错题复习</a>
        <a href="tag.html">🏷️ Tags</a>
      </nav>
    </header>
    <section class="toolbar" aria-label="副词接续词工具">
      <input class="search" id="search" type="search" placeholder="搜索日语、读音、中文、类别或例句，例如：ところが / 逆接 / 终于">
      <label class="voice-picker">日语声音<select id="voiceSelect" aria-label="选择日文语音"><option>载入中…</option></select></label>
      <button class="sound-toggle" id="soundToggle" type="button" aria-pressed="true">🔊 语音：开</button>
      <button class="auto-toggle" id="autoToggle" type="button" aria-pressed="false">▶ 自动听读</button>
    </section>
    <section class="filter-panel" aria-label="Tag 筛选">
      <button class="filter-toggle" id="filterToggle" type="button" aria-expanded="false" aria-controls="categories">
        <span>🏷️ Tag 筛选</span>
        <span class="filter-summary" id="filterSummary">全部</span>
        <span class="chevron" aria-hidden="true">⌄</span>
      </button>
      <div class="categories collapsed" id="categories"></div>
    </section>
    <p class="status" id="status">共 95 个项目</p>
    <section class="list" id="list" aria-live="polite"></section>
    <p class="empty" id="empty">没有找到这个项目。换个关键词试试看。</p>
    <p class="tip">小提示：先按功能类别筛一轮，再点 Sandy 或“自动听读”。页面会从当前屏幕附近开始，先读表达，再读例句；滚轮、触摸屏幕或方向键会停止自动听读。</p>
  </main>
  <div class="floating-controls" id="floatingControls" aria-label="Sandy 自动听读控制">
    <span class="floating-progress" id="floatingProgress">进度：还没开始</span>
    <button class="floating-sandy-toggle" id="floatingSandyToggle" type="button" aria-pressed="false" aria-label="点击 Sandy 开始自动听读">
      <span class="floating-sandy-bubble" id="floatingSandyBubble">点我自动听读</span>
      <img class="floating-sandy-image" src="assets/sandy-green-eyes.png" alt="Sandy 自动听读按钮">
      <span class="floating-sandy-status" id="floatingSandyStatus">AUTO READ</span>
    </button>
  </div>

  <script>
    const items = [
      {id:1,w:"途端に",r:"とたんに",m:"一……就；正当……的时候",c:"时间・瞬间",p:"Vた途端に。后项常是突然发生、意外结果。",e:"窓を開けた途端に、強い風が入ってきた。"},
      {id:2,w:"今に",r:"いまに",m:"早晚、迟早；至今",c:"时间・预测",p:"今に〜だろう／今に見ていろ。带“迟早会”的预感。",e:"今にこの努力が役に立つだろう。"},
      {id:3,w:"今にも",r:"いまにも",m:"眼看就要……",c:"时间・即将",p:"今にも〜そうだ。常接样态，表示马上要发生。",e:"空が暗く、今にも雨が降り出しそうだ。"},
      {id:4,w:"いつの間に",r:"いつのまに",m:"不知不觉中",c:"时间・无意识",p:"いつの間にか＋变化。强调没注意到过程。",e:"いつの間にか駅前に新しい店ができていた。"},
      {id:5,w:"だが",r:"",m:"可是、然而",c:"逆接",p:"较书面/硬一点的转折。",e:"彼は一生懸命説明した。だが、誰も納得しなかった。"},
      {id:6,w:"次第に",r:"しだいに",m:"渐渐、逐渐",c:"变化・渐进",p:"次第に＋变化动词/状态。",e:"日本語の会話力が次第に上がってきた。"},
      {id:7,w:"あげくに",r:"",m:"到头来、最终",c:"结果・消极",p:"Vた/Nのあげくに。多为消极结果。",e:"長時間話し合ったあげくに、結論は出なかった。"},
      {id:8,w:"やっと",r:"",m:"终于、好不容易",c:"时间・达成",p:"经历辛苦后终于实现。",e:"三時間待って、やっと電車が来た。"},
      {id:9,w:"すぐに",r:"",m:"立刻、马上",c:"时间・即刻",p:"表示时间间隔短。",e:"地震を感じたら、すぐに机の下に入ってください。"},
      {id:10,w:"どんなに",r:"",m:"多么……；无论多么……",c:"程度・让步",p:"どんなに〜ても。常与ても呼应。",e:"どんなに忙しくても、復習だけは続けたい。"},
      {id:11,w:"むしろ",r:"",m:"不如说、反倒",c:"对比・选择",p:"不是A，むしろB。选择更准确的说法。",e:"休むより、むしろ少し歩いたほうが気分転換になる。"},
      {id:12,w:"のみ",r:"",m:"仅仅、只",c:"限定",p:"书面语。Nのみ／Vるのみ。",e:"受付は本日午後五時までのみです。"},
      {id:13,w:"ただ",r:"",m:"只、只是；但是",c:"限定・补充转折",p:"既可表限定，也可作“不过”。看后文是否补充限制。",e:"ただ確認したかっただけです。ただ、言い方が少しきつかった。"},
      {id:14,w:"すべて",r:"",m:"全部",c:"数量・整体",p:"すべてのN／すべてV。",e:"書類はすべて机の上に置いてあります。"},
      {id:15,w:"それぞれ",r:"",m:"各自、分别",c:"分配",p:"それぞれ＋不同对象/做法。",e:"参加者はそれぞれ自分の意見を発表した。"},
      {id:16,w:"また",r:"",m:"又、另外；再",c:"添加・并列",p:"用于追加信息或动作重复。",e:"週末は掃除をした。また、来週の準備もした。"},
      {id:17,w:"何しろ",r:"なにしろ",m:"无论如何、毕竟",c:"理由强调",p:"何しろ〜から。强调理由很强。",e:"何しろ時間がないから、急いで決めよう。"},
      {id:18,w:"もともと",r:"",m:"本来、原本",c:"时间・原状态",p:"说明原本性质/初始状态。",e:"この建物はもともと学校だった。"},
      {id:19,w:"あるいは／または／もしくは",r:"",m:"或者、或是",c:"选择・并列",p:"AあるいはB。もしくは更书面。",e:"メール、あるいは電話でご連絡ください。"},
      {id:20,w:"もはや／すでに",r:"",m:"已经",c:"时间・既成",p:"もはや常带“已经到了某种程度/不再…”。",e:"もはや一人で解決できる問題ではない。"},
      {id:21,w:"ほぼ",r:"",m:"大体上、大致",c:"程度・近似",p:"ほぼ完成／ほぼ同じ。",e:"レポートはほぼ完成している。"},
      {id:22,w:"なんとなく",r:"",m:"总觉得、不由得",c:"感觉・模糊",p:"理由不明确的感觉。",e:"なんとなく今日は集中できない。"},
      {id:23,w:"そもそも",r:"",m:"说到底、原本",c:"根本・开端",p:"回到问题根源；常用于反驳或重新定义。",e:"そもそもこの計画には無理があった。"},
      {id:24,w:"もっと",r:"",m:"更加",c:"程度・比较",p:"もっと＋形容词/副词/动词。",e:"もっと自然な日本語で話せるようになりたい。"},
      {id:25,w:"ますます（益々）",r:"ますます",m:"越发、越来越",c:"变化・增强",p:"ますます＋程度增加。",e:"日本語の勉強がますます楽しくなってきた。"},
      {id:26,w:"日々",r:"ひび",m:"天天、日日",c:"时间・反复",p:"日々努力する。较书面。",e:"合格のために日々努力している。"},
      {id:27,w:"それより",r:"",m:"比起那个；对了",c:"话题转换・比较",p:"用于转移话题或提出更重要的事。",e:"それより、明日の試験の準備は終わった？"},

    ];

    let selectedCategories = new Set();

    const CATEGORY_GROUPS = [
      { title: "时间・频率", match: (category) => /^时间/.test(category) || /^频率/.test(category) || ["反复", "偶然", "持续・比较"].includes(category) },
      { title: "因果・条件・承接", match: (category) => /^因果/.test(category) || /^条件/.test(category) || /^结果/.test(category) || /^承接/.test(category) || category === "假设" || category === "推量・确信" },
      { title: "逆接・让步・反结果", match: (category) => /^逆接/.test(category) || category.includes("让步") || category.includes("反结果") },
      { title: "添加・并列・选择・补充", match: (category) => /^添加/.test(category) || /^并列/.test(category) || /^选择/.test(category) || /^补充/.test(category) || category === "对比・选择" || category === "分配" },
      { title: "限定・数量・程度・强调", match: (category) => /^限定/.test(category) || /^数量/.test(category) || /^程度/.test(category) || category === "强调" },
      { title: "方式・态度・无意识", match: (category) => /^方式/.test(category) || /^态度/.test(category) || /^无意识/.test(category) || ["感觉・模糊", "意外・怀疑", "理由强调"].includes(category) },
      { title: "总结・换言・话题", match: (category) => /^总结/.test(category) || /^换言/.test(category) || category.includes("话题") || category === "根本・开端" },
      { title: "变化・结果・评价・感情", match: (category) => /^变化/.test(category) || /^评价/.test(category) || category === "感情" || category === "保留・转换" }
    ];
    const escapeHtml = (value) => String(value ?? "").replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));

    function visibleItems() {
      const q = $("search").value.trim().toLowerCase();
      return items
        .filter((item) => selectedCategories.size === 0 || selectedCategories.has(item.c))
        .filter((item) => !q || [item.w, item.r, item.m, item.c, item.p, item.e].some((value) => String(value || "").toLowerCase().includes(q)));
    }
    function selectedCategoryLabel() {
      if (selectedCategories.size === 0) return "全部";
      const selected = [...selectedCategories];
      if (selected.length <= 3) return selected.join("、");
      return `${selected.slice(0, 3).join("、")} +${selected.length - 3}`;
    }
    function renderCategories() {
      const availableCategories = [...new Set(items.map((item) => item.c))];
      $("filterToggle").setAttribute("aria-expanded", String(filtersOpen));
      $("categories").classList.toggle("collapsed", !filtersOpen);
      $("filterSummary").textContent = selectedCategoryLabel();
      const categoryButton = (category, label = category, extraClass = "") => {
        const active = category === "全部" ? selectedCategories.size === 0 : selectedCategories.has(category);
        return `<button class="category ${extraClass}" type="button" data-category="${escapeHtml(category)}" aria-pressed="${active}">${escapeHtml(label)}</button>`;
      };
      const grouped = new Set();
      const groupHtml = CATEGORY_GROUPS.map((group, groupIndex) => {
        const cats = availableCategories.filter((category) => !grouped.has(category) && group.match(category)).sort((a, b) => a.localeCompare(b, "zh-Hans"));
        cats.forEach((category) => grouped.add(category));
        if (!cats.length) return "";
        const selectedCount = cats.filter((category) => selectedCategories.has(category)).length;
        const allSelected = selectedCount === cats.length;
        return `<section class="category-group">
          <div class="category-group-title">
            <span>${escapeHtml(group.title)}</span>
            <span class="category-group-meta">
              <span class="category-count">已选 ${selectedCount}/${cats.length}</span>
              <button class="category-group-select" type="button" data-category-group="${groupIndex}" aria-pressed="${allSelected}">${allSelected ? "取消本组" : "全选本组"}</button>
            </span>
          </div>
          <div class="category-group-tags">${cats.map((category) => categoryButton(category)).join("")}</div>
        </section>`;
      }).join("");
      const leftover = availableCategories.filter((category) => !grouped.has(category)).sort((a, b) => a.localeCompare(b, "zh-Hans"));
      const leftoverSelectedCount = leftover.filter((category) => selectedCategories.has(category)).length;
      const leftoverAllSelected = leftover.length > 0 && leftoverSelectedCount === leftover.length;
      const leftoverHtml = leftover.length ? `<section class="category-group">
        <div class="category-group-title">
          <span>其他</span>
          <span class="category-group-meta">
            <span class="category-count">已选 ${leftoverSelectedCount}/${leftover.length}</span>
            <button class="category-group-select" type="button" data-category-group="leftover" aria-pressed="${leftoverAllSelected}">${leftoverAllSelected ? "取消本组" : "全选本组"}</button>
          </span>

        <div class="category-group-tags">${leftover.map((category) => categoryButton(category)).join("")}</div>
      </section>` : "";
      $("categories").innerHTML = `<div class="category-actions">${categoryButton("全部", "全部 / 清空", "clear")}</div>${groupHtml}${leftoverHtml}`;
    }
    function categoriesForGroup(groupKey) {
      const availableCategories = [...new Set(items.map((item) => item.c))];
      const grouped = new Set();
      CATEGORY_GROUPS.forEach((group) => {
        availableCategories.filter((category) => !grouped.has(category) && group.match(category)).forEach((category) => grouped.add(category));
      });
      if (groupKey === "leftover") return availableCategories.filter((category) => !grouped.has(category)).sort((a, b) => a.localeCompare(b, "zh-Hans"));
      const group = CATEGORY_GROUPS[Number(groupKey)];
      if (!group) return [];
      return availableCategories.filter((category) => group.match(category)).sort((a, b) => a.localeCompare(b, "zh-Hans"));
    }
    function toggleCategoryGroup(groupKey) {
      stopAuto();
      const cats = categoriesForGroup(groupKey);
      if (!cats.length) return;
      const allSelected = cats.every((category) => selectedCategories.has(category));
      cats.forEach((category) => {
        if (allSelected) selectedCategories.delete(category);
        else selectedCategories.add(category);
      });
      renderCategories();
      renderList();
    }
    function toggleCategoryFilter(category, scrollToFilters = false, openFilters = false) {
      stopAuto();
      if (!category || category === "全部") {
        selectedCategories.clear();
      } else if (selectedCategories.has(category)) {
        selectedCategories.delete(category);
      } else {
        selectedCategories.add(category);
      }
      if (openFilters) filtersOpen = true;
      renderCategories();
      renderList();
      if (scrollToFilters) $("filterToggle").scrollIntoView({ behavior: "smooth", block: "center" });
    }
    function renderList() {

          <div class="meta">

          </div>
          <div class="meaning">${item.m}</div>
          <div class="point">${item.p}</div>
          <button class="example-button" type="button" data-example="${item.id}" aria-label="朗读例句：${item.e}">
            <span class="example-label">例句 🔊</span><span>${item.e}</span>
          </button>
        </article>
      `).join("");
      if (!autoActive) updateFloatingProgress();
    }
    function updateSoundToggle() {
      $("soundToggle").setAttribute("aria-pressed", String(soundEnabled));
      $("soundToggle").textContent = soundEnabled ? "🔊 语音：开" : "🔇 语音：关";
    }
    function updateAutoToggle() {
      $("autoToggle").setAttribute("aria-pressed", String(autoActive));
      $("autoToggle").textContent = autoActive ? "⏸ 停止听读" : "▶ 自动听读";
      updateFloatingSandyToggle();
    }
    function updateFloatingSandyToggle() {
      const toggle = $("floatingSandyToggle");
      const bubble = $("floatingSandyBubble");
      const status = $("floatingSandyStatus");
      if (!toggle || !bubble || !status) return;
      toggle.setAttribute("aria-pressed", String(autoActive));
      toggle.setAttribute("aria-label", autoActive ? "点击 Sandy 暂停自动听读" : "点击 Sandy 开始自动听读");
      bubble.textContent = autoActive ? "Sandy..." : "点我自动听读";
      status.textContent = autoActive ? "..." : "AUTO READ";
    }
    function updateFloatingProgress(item = null) {
      const progress = $("floatingProgress");
      if (!progress) return;
      progress.textContent = item ? `进度：${String(item.id).padStart(3, "0")} / ${items.length}　${item.r || item.w}` : "进度：还没开始";
    }
    function loadVoices() {
      if (!("speechSynthesis" in window)) return;
      japaneseVoices = window.speechSynthesis.getVoices().filter((voice) => voice.lang.toLowerCase().startsWith("ja"));
      const select = $("voiceSelect");
      const previous = select.value;
      select.innerHTML = "";
      if (!japaneseVoices.length) {
        select.innerHTML = "<option>浏览器暂未提供日语声音</option>";
        return;
      }
      japaneseVoices.forEach((voice) => {
        const option = document.createElement("option");
        option.value = voice.name;
        option.textContent = voice.name;
        select.appendChild(option);
      });
      const preferred = japaneseVoices.find((voice) => voice.name === previous) || japaneseVoices.find((voice) => /siri|kyoko|haruka|nanami|female/i.test(voice.name)) || japaneseVoices[0];
      select.value = preferred.name;
    }
    function speakJapanese(text, button, options = {}) {
      if (!soundEnabled || !("SpeechSynthesisUtterance" in window)) return Promise.resolve(false);
      return new Promise((resolve) => {
        if (options.cancelCurrent !== false) window.speechSynthesis.cancel();
        window.speechSynthesis.resume();
        document.querySelectorAll(".speaking").forEach((node) => node.classList.remove("speaking"));
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = "ja-JP";
        utterance.rate = .82;
        utterance.pitch = 1;
        const voice = japaneseVoices.find((voice) => voice.name === $("voiceSelect").value) || japaneseVoices[0];
        if (voice) utterance.voice = voice;
        button?.classList.add("speaking");
        let done = false;
        const finish = () => {
          if (done) return;
          done = true;
          clearTimeout(timer);
          button?.classList.remove("speaking");
          resolve(true);
        };
        const timer = setTimeout(finish, Math.min(16000, Math.max(2200, text.length * 230)));
        utterance.onend = finish;
        utterance.onerror = finish;
        window.speechSynthesis.speak(utterance);
      });
    }
    function stopAuto() {
      autoActive = false;
      autoToken++;
      clearTimeout(autoTimer);
      if ("speechSynthesis" in window) window.speechSynthesis.cancel();
      document.querySelectorAll(".speaking, .entry.playing").forEach((node) => node.classList.remove("speaking", "playing"));
      updateAutoToggle();
      updateFloatingProgress();
    }
    function firstVisibleEntryIndex(entries) {
      const visibleIndex = entries.findIndex((entry) => entry.getBoundingClientRect().bottom > 130);
      return Math.max(0, visibleIndex);
    }
    async function playAuto(token) {
      const entries = [...document.querySelectorAll(".entry")];
      if (!autoActive || token !== autoToken || autoIndex >= entries.length) { stopAuto(); return; }
      const entry = entries[autoIndex];
      const item = items.find((candidate) => String(candidate.id) === entry.dataset.id);
      if (!item) { autoIndex++; playAuto(token); return; }
      document.querySelectorAll(".entry.playing").forEach((node) => node.classList.remove("playing"));
      entry.classList.add("playing");
      updateFloatingProgress(item);
      entry.scrollIntoView({ behavior: "smooth", block: "center" });
      await delay(380);
      if (!autoActive || token !== autoToken) return;
      await speakJapanese(item.r || item.w, entry.querySelector(".term-button"));
      if (!autoActive || token !== autoToken) return;
      await delay(180);
      await speakJapanese(item.e, entry.querySelector(".example-button"));
      if (!autoActive || token !== autoToken) return;
      await delay(430);
      entry.classList.remove("playing");
      autoIndex++;
      playAuto(token);
    }
    function toggleAuto() {
      if (autoActive) { stopAuto(); return; }
      if (!soundEnabled && "speechSynthesis" in window) {
        soundEnabled = true;
        updateSoundToggle();
      }
      const entries = [...document.querySelectorAll(".entry")];
      if (!entries.length) { stopAuto(); return; }
      autoActive = true;
      autoToken++;
      autoIndex = firstVisibleEntryIndex(entries);
      updateAutoToggle();
      playAuto(autoToken);
    }

    function saveFloatingSandyPosition() {
      const controls = $("floatingControls");
      if (!controls) return;
      const box = controls.getBoundingClientRect();
      try { localStorage.setItem(floatingSandyPositionKey, JSON.stringify({ left: box.left, top: box.top })); } catch {}
    }
    function positionFloatingSandy(left, top) {
      const controls = $("floatingControls");
      if (!controls) return;
      const box = controls.getBoundingClientRect();
      const nextLeft = Math.min(Math.max(0, left), Math.max(0, window.innerWidth - box.width));
      const nextTop = Math.min(Math.max(0, top), Math.max(0, window.innerHeight - box.height));
      controls.style.left = `${nextLeft}px`;
      controls.style.top = `${nextTop}px`;
      controls.style.right = "auto";
      controls.style.bottom = "auto";
      controls.style.justifyItems = "end";
    }
    function restoreFloatingSandyPosition() {
      try {
        const saved = JSON.parse(localStorage.getItem(floatingSandyPositionKey) || "null");
        if (!saved || !Number.isFinite(saved.left) || !Number.isFinite(saved.top)) return;
        requestAnimationFrame(() => positionFloatingSandy(saved.left, saved.top));
      } catch {}
    }
    function beginFloatingSandyDrag(event) {
      if (event.button !== undefined && event.button !== 0) return;
      const controls = $("floatingControls");
      if (!controls) return;
      const box = controls.getBoundingClientRect();
      controls.setPointerCapture(event.pointerId);
      floatingSandyDrag = {
        pointerId: event.pointerId,
        startX: event.clientX,
        startY: event.clientY,
        left: box.left,
        top: box.top,
        moved: false
      };
      controls.classList.add("dragging");
      event.preventDefault();
      event.stopPropagation();
    }
    function moveFloatingSandyDrag(event) {
      if (!floatingSandyDrag || event.pointerId !== floatingSandyDrag.pointerId) return;
      const dx = event.clientX - floatingSandyDrag.startX;
      const dy = event.clientY - floatingSandyDrag.startY;
      if (Math.abs(dx) > 5 || Math.abs(dy) > 5) floatingSandyDrag.moved = true;
      positionFloatingSandy(floatingSandyDrag.left + dx, floatingSandyDrag.top + dy);
      event.preventDefault();
      event.stopPropagation();
    }
    function endFloatingSandyDrag(event) {
      if (!floatingSandyDrag || event.pointerId !== floatingSandyDrag.pointerId) return;
      const wasDrag = floatingSandyDrag.moved;
      const controls = $("floatingControls");
      controls?.classList.remove("dragging");
      if (controls?.hasPointerCapture(event.pointerId)) controls.releasePointerCapture(event.pointerId);
      floatingSandyDrag = null;
      if (wasDrag) saveFloatingSandyPosition();
      else toggleAuto();
      event.preventDefault();
      event.stopPropagation();
    }
    function cancelFloatingSandyDrag(event) {
      if (!floatingSandyDrag || event.pointerId !== floatingSandyDrag.pointerId) return;
      const controls = $("floatingControls");
      controls?.classList.remove("dragging");
      floatingSandyDrag = null;
    }

    $("search").addEventListener("input", () => { stopAuto(); renderList(); });
    $("filterToggle").addEventListener("click", () => {
      filtersOpen = !filtersOpen;
      renderCategories();
    });
    $("categories").addEventListener("click", (event) => {
      const groupButton = event.target.closest("[data-category-group]");
      if (groupButton) {
        toggleCategoryGroup(groupButton.dataset.categoryGroup);
        return;
      }
      const button = event.target.closest("[data-category]");
      if (!button) return;
      toggleCategoryFilter(button.dataset.category);
    });
    $("list").addEventListener("click", (event) => {
      const categoryButton = event.target.closest("[data-category-filter]");
      if (categoryButton) {
        toggleCategoryFilter(categoryButton.dataset.categoryFilter, true, true);
        return;
      }
      const speak = event.target.closest("[data-speak]");
      const example = event.target.closest("[data-example]");
      if (speak) {
        stopAuto();
        const item = items.find((candidate) => String(candidate.id) === speak.dataset.speak);
        if (item) speakJapanese(item.r || item.w, speak);
      }
      if (example) {
        stopAuto();
        const item = items.find((candidate) => String(candidate.id) === example.dataset.example);
        if (item) speakJapanese(item.e, example);
      }
    });
    $("soundToggle").addEventListener("click", () => {
      soundEnabled = !soundEnabled;
      if (!soundEnabled && "speechSynthesis" in window) window.speechSynthesis.cancel();
      updateSoundToggle();
    });
    $("autoToggle").addEventListener("click", toggleAuto);
    $("floatingSandyToggle").addEventListener("pointerdown", beginFloatingSandyDrag);
    $("floatingControls").addEventListener("pointermove", moveFloatingSandyDrag);
    $("floatingControls").addEventListener("pointerup", endFloatingSandyDrag);
    $("floatingControls").addEventListener("pointercancel", cancelFloatingSandyDrag);
    $("floatingControls").addEventListener("touchstart", (event) => event.stopPropagation(), { passive: true });
    $("floatingSandyToggle").addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        event.stopPropagation();
        toggleAuto();
      }
    });
    $("voiceSelect").addEventListener("change", () => {});
    window.addEventListener("wheel", stopAuto, { passive: true });
    window.addEventListener("touchstart", stopAuto, { passive: true });
    window.addEventListener("keydown", (event) => {
      if (["ArrowDown", "ArrowUp", "PageDown", "PageUp", "Home", "End", " "].includes(event.key)) stopAuto();
    });
    updateSoundToggle();
    updateAutoToggle();
    renderCategories();
    renderList();
    restoreFloatingSandyPosition();
    loadVoices();
    if ("speechSynthesis" in window) window.speechSynthesis.addEventListener("voiceschanged", loadVoices);
  </script>
</body>
</html>
